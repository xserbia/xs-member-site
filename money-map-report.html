            {sorted.map(a=>{
              const cat = ASSET_CATS.find(c=>c.id===a.categoryId);
              const pct = (a.amount/tAss*100).toFixed(2);
              const mos = (a.amount/gap).toFixed(1);
              return (
                <div key={a.id} style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <span style={{fontSize:'16px'}}>{cat?.icon}</span>
                      <div>
                        <div style={{fontSize:'13px',fontWeight:'700',color:'#334155'}}>{a.label}</div>
                        <div style={{fontSize:'10px',fontWeight:'700',color:cat?.color}}>{cat?.liqLabel}</div>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'13px',fontWeight:'800',color: a.debt>0?'#059669':'#0f172a'}}>{fmt(a.amount)}{a.debt>0 && <span style={{fontSize:'10px',fontWeight:'600',color:'#059669',marginLeft:'4px'}}>neto</span>}</div>
                      <div style={{fontSize:'11px',fontWeight:'700',color:cat?.color}}>{mos} meses</div>
                    </div>
                  </div>
                  <div style={{height:'8px',background:'#f1f5f9',borderRadius:'4px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:cat?.color,borderRadius:'4px',opacity:0.8}}/>
                  </div>
                </div>
              );
            })}

            {/* Cumulative Timeline */}
            {(() => {
              // Build cumulative segments with month markers
              let cumMonths = 0;
              const segs = sorted.map(a => {
                const cat   = ASSET_CATS.find(c=>c.id===a.categoryId);
                const mos   = a.amount / gap;
                const start = cumMonths;
                cumMonths  += mos;
                const pct   = (mos / totalMonths * 100).toFixed(2);
                return { ...a, cat, mos, start, end: cumMonths, pct };
              });
              // Tick marks: every 6 months up to totalMonths
              const tickInterval = totalMonths <= 12 ? 3 : totalMonths <= 36 ? 6 : 12;
              const ticks = [];
              for (let t = 0; t <= Math.ceil(totalMonths); t += tickInterval) {
                if (t > totalMonths) break;
                ticks.push(t);
              }
              if (ticks[ticks.length-1] < totalMonths) ticks.push(Math.round(totalMonths));
              return (
                <div style={{marginTop:'16px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'14px'}}>
                  <div style={{fontSize:'11px',fontWeight:'700',color:'#94a3b8',letterSpacing:'1px',marginBottom:'9px'}}>LÍNEA DE TIEMPO ACUMULATIVA</div>
                  {/* Strip */}
                  <div style={{display:'flex',height:'30px',borderRadius:'8px',overflow:'hidden',gap:'2px'}}>
                    {segs.map(s=>(
                      <div key={s.id} title={`${s.label}: mes ${s.start.toFixed(1)} → ${s.end.toFixed(1)}`}
                        style={{width:`${s.pct}%`,background:s.cat?.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',borderRadius:'5px',flexShrink:'0',overflow:'hidden',position:'relative'}}>
                        {s.pct>7 ? s.cat?.icon : ''}
                      </div>
                    ))}
                  </div>
                  {/* Cumulative month ticks */}
                  <div style={{position:'relative',marginTop:'6px',height:'18px'}}>
                    {ticks.map(t=>{
                      const leftPct = (t / totalMonths * 100);
                      return (
                        <div key={t} style={{position:'absolute',left:`${leftPct}%`,transform:'translateX(-50%)',fontSize:'11px',color:'#94a3b8',fontWeight:'600',whiteSpace:'nowrap'}}>
                          {t===0 ? 'Hoy' : `Mes ${t}`}
                        </div>
                      );
                    })}
                  </div>
                  {/* Legend */}
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'14px'}}>
                    {segs.map(s=>(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'600',color:'#475569'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'3px',background:s.cat?.color,flexShrink:'0'}}/>
                        <span>{s.label}</span>
                        <span style={{color:s.cat?.color,fontWeight:'800'}}>→ mes {Math.round(s.end)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        );
      })()}

      <div style={{fontSize:'11px',color:'#cbd5e1',textAlign:'center',lineHeight:'1.8',fontWeight:'500',paddingBottom:'1rem'}}>
        Asume gastos constantes. No considera rendimientos, inflación ni costos de liquidación.
      </div>

      {/* ── Edit Expenses Modal */}
      {editExp && (
        <div style={overlayS} onClick={e=>{if(e.target===e.currentTarget)setEditExp(false);}}>
          <div style={modalS}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
              <div><div style={{fontWeight:'900',fontSize:'1.2rem'}}>Gastos Mensuales</div><div style={{fontSize:'12px',color:'#94a3b8'}}>Pre-cargados desde tu Money Map</div></div>
              <button onClick={()=>setEditExp(false)} style={{background:'#f1f5f9',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'16px',color:'#64748b'}}>✕</button>
            </div>
            {EXPENSE_CATS.map(cat=>(
              <div key={cat.id} style={{marginBottom:'12px'}}>
                <div style={{fontSize:'13px',fontWeight:'700',marginBottom:'5px'}}>{cat.icon} {cat.label}</div>
                <div style={{display:'flex',alignItems:'center',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',overflow:'hidden'}}>
                  <span style={{padding:'0 12px',color:'#94a3b8',fontWeight:'700'}}>$</span>
                  <input type="number" placeholder="0" value={expDraft[cat.id]||''}
                    onChange={e=>setExpDraft(d=>({...d,[cat.id]:e.target.value}))}
                    style={{flex:'1',background:'transparent',border:'none',padding:'11px 4px',fontSize:'15px',fontWeight:'800',fontFamily:'inherit',color:'#0f172a'}}/>
                  <span style={{padding:'0 12px',color:'#94a3b8',fontSize:'12px',fontWeight:'600'}}>/mes</span>
                </div>
              </div>
            ))}
            <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'12px',padding:'12px 16px',display:'flex',justifyContent:'space-between',margin:'16px 0'}}>
              <span style={{fontWeight:'700',color:'#1d4ed8',fontSize:'13px'}}>Total mensual</span>
              <span style={{fontWeight:'900',fontSize:'1.25rem',color:'#1d4ed8'}}>{fmt(Object.values(expDraft).reduce((s,v)=>s+(parseFloat(v)||0),0))}</span>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button onClick={()=>{setExpVals({...expDraft});setEditExp(false);}} style={{flex:1,padding:'13px',background:'#1d4ed8',border:'none',borderRadius:'12px',color:'white',fontSize:'15px',fontWeight:'800',cursor:'pointer',fontFamily:'inherit'}}>Guardar</button>
              <button onClick={()=>setEditExp(false)} style={{padding:'13px 18px',background:'#f1f5f9',border:'none',borderRadius:'12px',color:'#64748b',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Add Asset Modal */}
      {showAddAsset && (
        <div style={overlayS} onClick={e=>{if(e.target===e.currentTarget)setShowAddAsset(false);}}>
          <div style={modalS}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
              <div style={{fontWeight:'900',fontSize:'1.2rem'}}>Agregar Activo</div>
              <button onClick={()=>setShowAddAsset(false)} style={{background:'#f1f5f9',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'16px',color:'#64748b'}}>✕</button>
            </div>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'8px'}}>CATEGORÍA</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'16px'}}>
              {ASSET_CATS.map(cat=>{
                const sel=assetDraft.categoryId===cat.id;
                return <button key={cat.id} onClick={()=>setADraft(d=>({...d,categoryId:cat.id}))}
                  style={{background:sel?cat.bg:'#f8fafc',border:`2px solid ${sel?cat.color:'#e2e8f0'}`,borderRadius:'12px',padding:'10px 12px',textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
                  <div style={{fontSize:'18px',marginBottom:'3px'}}>{cat.icon}</div>
                  <div style={{fontSize:'12px',fontWeight:'800',color:sel?cat.color:'#334155'}}>{cat.label}</div>
                  <div style={{fontSize:'10px',color:'#94a3b8',marginTop:'2px'}}>{cat.liqLabel}</div>
                </button>;
              })}
            </div>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'6px'}}>NOMBRE</div>
            <input value={assetDraft.label} onChange={e=>setADraft(d=>({...d,label:e.target.value}))}
              placeholder="Ej: Checking BofA" style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',padding:'10px 14px',fontSize:'14px',fontWeight:'700',fontFamily:'inherit',marginBottom:'14px'}}/>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'6px'}}>VALOR</div>
            <div style={{display:'flex',alignItems:'center',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',overflow:'hidden',marginBottom:'20px'}}>
              <span style={{padding:'0 12px',color:'#94a3b8',fontSize:'18px',fontWeight:'700'}}>$</span>
              <input type="number" value={assetDraft.amount} onChange={e=>setADraft(d=>({...d,amount:e.target.value}))}
                placeholder="0" style={{flex:'1',background:'transparent',border:'none',padding:'12px 4px',fontSize:'22px',fontWeight:'900',fontFamily:'inherit',color:'#0f172a'}}
                onKeyDown={e=>{if(e.key==='Enter'){const amt=parseFloat(assetDraft.amount);if(!amt||amt<=0)return;const cat=ASSET_CATS.find(c=>c.id===assetDraft.categoryId);setAssets(p=>[...p,{id:Date.now(),categoryId:assetDraft.categoryId,label:assetDraft.label||cat.label,amount:amt}]);setADraft({categoryId:'cash',label:'',amount:''});setShowAddAsset(false);}}}/>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button onClick={()=>{const amt=parseFloat(assetDraft.amount);if(!amt||amt<=0)return;const cat=ASSET_CATS.find(c=>c.id===assetDraft.categoryId);setAssets(p=>[...p,{id:Date.now(),categoryId:assetDraft.categoryId,label:assetDraft.label||cat.label,amount:amt}]);setADraft({categoryId:'cash',label:'',amount:''});setShowAddAsset(false);}}
                style={{flex:1,padding:'13px',background:'#1d4ed8',border:'none',borderRadius:'12px',color:'white',fontSize:'15px',fontWeight:'800',cursor:'pointer',fontFamily:'inherit'}}>Agregar</button>
              <button onClick={()=>setShowAddAsset(false)} style={{padding:'13px 18px',background:'#f1f5f9',border:'none',borderRadius:'12px',color:'#64748b',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============= RATIOS FINANCIEROS =============
function RatiosFinancieros({ ratiosData, setRatiosData, totales, currency, ingresos, gastos, deudas, userProfile, setActiveTab }) {
  const [showBenchmarkModal, setShowBenchmarkModal] = useState(false);
  const [showReservaModal, setShowReservaModal] = useState(false);
  const [showCorrienteModal, setShowCorrienteModal] = useState(false);
  // Keys included in pasivosCorrientes for razón corriente
  const [corrienteItems, setCorrienteItems] = useState(() => {
    const saved = localStorage.getItem('corrienteItems');
    return saved ? JSON.parse(saved) : { diarios: true, seguros: true, deuda: true, tarjetas: false, lineaPersonal: false };
  });
  React.useEffect(() => { localStorage.setItem('corrienteItems', JSON.stringify(corrienteItems)); }, [corrienteItems]);
  const [corrienteCustoms, setCorrienteCustoms] = useState(() => {
    const saved = localStorage.getItem('corrienteCustoms');
    return saved ? JSON.parse(saved) : [];  // [{id, label, monto, enabled}]
  });
  React.useEffect(() => { localStorage.setItem('corrienteCustoms', JSON.stringify(corrienteCustoms)); }, [corrienteCustoms]);
  const [newCustomLabel, setNewCustomLabel] = useState('');
  const [newCustomMonto, setNewCustomMonto] = useState('');
  const updateField = (field, val) => setRatiosData(prev => ({ ...prev, [field]: val }));

  // ratiosData is kept in sync by App-level useEffect

  const calcRatios = () => {
    const e=parseNumber(ratiosData.edad), ib=parseNumber(ratiosData.ingresoBruto), ineto=parseNumber(ratiosData.ingresoNeto);
    const ah=parseNumber(ratiosData.ahorroAnual), imp=parseNumber(ratiosData.impuestosAnual), seg=parseNumber(ratiosData.segurosAnual);
    const gd=parseNumber(ratiosData.gastosAnual), da=parseNumber(ratiosData.deudaAnual);
    const ge=parseNumber(ratiosData.gastosEsencialesMensuales), res=parseNumber(ratiosData.reserva);
    const pd=parseNumber(ratiosData.pagoDeudaMensual);
    const diariosAmt  = (gastos.diarios||[]).reduce((s,g)=>s+parseFloat(g.monto||0),0)*12;
    const segurosAmt  = (gastos.seguros||[]).reduce((s,g)=>s+parseFloat(g.monto||0),0)*12;
    const deudaAmt    = (gastos.deuda||[]).reduce((s,g)=>s+parseFloat(g.monto||0),0)*12;
    const tarjetasAmt = (deudas?.tarjetas||[]).reduce((s,d)=>s+parseFloat(d.balance||0),0);
    const lineaAmt    = (deudas?.lineaPersonal||[]).reduce((s,d)=>s+parseFloat(d.balance||0),0);
    const customsTotal = corrienteCustoms.filter(c=>c.enabled).reduce((s,c)=>s+parseFloat(c.monto||0),0);
    const pc = (corrienteItems.diarios?diariosAmt:0)+(corrienteItems.seguros?segurosAmt:0)+(corrienteItems.deuda?deudaAmt:0)+(corrienteItems.tarjetas?tarjetasAmt:0)+(corrienteItems.lineaPersonal?lineaAmt:0)+customsTotal;
    const sup = ineto-(imp+seg+gd+da+ah);
    const gastosT = imp+seg+gd+da;
    return {
      edad:e, ingresoBruto:ib, ingresoNeto:ineto, superavitAnual:sup, ahorroAnual:ah, gastosAnualesTotales:gastosT,
      activosTotales:totales.activosTotales, pasivosTotales:totales.pasivosTotales, patrimonioNeto:totales.patrimonioNeto,
      mesesReserva:     ge>0?res/ge:NaN,
      razonCorriente:   pc>0?totales.activosLiquidos/pc:NaN,
      tasaAhorro:       ib>0?ah/ib:NaN,
      capAcum:          ineto>0?(ah+sup)/ineto:NaN,
      dtiNeto:          (ineto/12)>0?pd/(ineto/12):NaN,
      deudaActivos:     totales.activosTotales>0?totales.pasivosTotales/totales.activosTotales:NaN,
      patrimonioActivos:totales.activosTotales>0?totales.patrimonioNeto/totales.activosTotales:NaN,
      inversionRatio:   ib>0?totales.inversiones/ib:NaN,
      riquezaNeta:      ib>0?totales.patrimonioNeto/ib:NaN,
      ahorroRetiro:     ib>0?totales.totalRetiro/ib:NaN,
    };
  };
  const ratios = calcRatios();
  const mesesRecomendados = calcMesesRecomendados(userProfile);
  const umbralAmber       = Math.round(mesesRecomendados * 0.67);

  const Tip = ({text,children}) => {
    const [show,setShow]=React.useState(false);
    return <span style={{position:'relative',display:'inline-flex',alignItems:'center'}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      {show&&<span style={{position:'absolute',bottom:'100%',left:'50%',transform:'translateX(-50%)',marginBottom:'8px',padding:'8px 12px',background:'#1f2937',color:'white',borderRadius:'8px',fontSize:'13px',lineHeight:'1.4',width:'250px',zIndex:1000,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',pointerEvents:'none'}}>{text}</span>}
    </span>;
  };

  const getInvBm  = age => { if(age<25)return 0.2; if(age<=30)return 0.2+(age-25)*(0.6-0.2)/10; if(age<=40)return 0.6+(age-30)*(3-0.6)/10; if(age<=50)return 3+(age-40)*(8-3)/10; if(age<=60)return 8+(age-50)*(16-8)/10; return 16; };
  const getRiqBm  = age => { const bms=[{age:25,good:2.5,great:5},{age:30,good:3,great:6},{age:35,good:3.5,great:7},{age:40,good:4,great:8},{age:45,good:4.5,great:9},{age:50,good:5,great:10},{age:55,good:5.5,great:11},{age:60,good:6,great:12},{age:65,good:6.5,great:13},{age:70,good:7,great:14}]; if(age<25)return bms[0]; if(age>=70)return bms[bms.length-1]; for(let i=0;i<bms.length-1;i++){if(age>=bms[i].age&&age<bms[i+1].age){const t=(age-bms[i].age)/(bms[i+1].age-bms[i].age);return{good:bms[i].good+t*(bms[i+1].good-bms[i].good),great:bms[i].great+t*(bms[i+1].great-bms[i].great)};}} return bms[bms.length-1]; };
  const getRetBm  = age => { const bms=[{age:25,f:0.35},{age:30,f:0.85},{age:35,f:1.5},{age:40,f:2.58},{age:45,f:3.14},{age:50,f:4.92},{age:55,f:6.35},{age:60,f:7.23},{age:65,f:10.84},{age:70,f:11}]; if(age<25)return bms[0].f; if(age>=70)return bms[bms.length-1].f; for(let i=0;i<bms.length-1;i++){if(age>=bms[i].age&&age<bms[i+1].age){const t=(age-bms[i].age)/(bms[i+1].age-bms[i].age);return bms[i].f+t*(bms[i+1].f-bms[i].f);}} return bms[bms.length-1].f; };

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Activos Totales</div><div className="stat-value">{formatCurrency(totales.activosTotales,currency)}</div></div>
        <div className="stat-card" style={{background:'linear-gradient(135deg,var(--danger) 0%,#dc2626 100%)'}}><div className="stat-label">Pasivos Totales</div><div className="stat-value">{formatCurrency(totales.pasivosTotales,currency)}</div></div>
        <div className="stat-card" style={{background:totales.patrimonioNeto>=0?'linear-gradient(135deg,var(--emerald) 0%,var(--emerald-dark) 100%)':'linear-gradient(135deg,var(--danger) 0%,#dc2626 100%)'}}><div className="stat-label">Patrimonio Neto</div><div className="stat-value">{formatCurrency(totales.patrimonioNeto,currency)}</div></div>
      </div>

      

            <div>

              {/* Summary */}
              <div style={{background:'white',margin:'12px 0',borderRadius:'16px',boxShadow:'0 2px 8px rgba(0,0,0,.08)',padding:'16px'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
                  {[['Ingreso',ratios.ingresoBruto,'var(--success)'],['Gastos',ratios.gastosAnualesTotales,'var(--danger)'],['Ahorro*',ratios.ahorroAnual,'var(--success)'],['Activos',ratios.activosTotales,null],['Pasivos',ratios.pasivosTotales,null],['Patrimonio',ratios.patrimonioNeto,ratios.patrimonioNeto>=0?'var(--success)':'var(--danger)']].map(([label,val,col])=>(
                    <div key={label} style={{background:'#fafafa',borderRadius:'12px',padding:'14px',textAlign:'center'}}>
                      <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'6px',fontWeight:'600'}}>{label}</div>
                      <div style={{fontSize:'22px',fontWeight:'800',color:col||'#333'}}>{formatCurrency(val,currency)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* KPI sections */}
              {[
                {title:'💧 LIQUIDEZ', cards:[
                  {label:'Meses de reserva',val:isFinite(ratios.mesesReserva)?ratios.mesesReserva.toFixed(1)+' m':'—',ok:ratios.mesesReserva>=mesesRecomendados?'✅':ratios.mesesReserva>=umbralAmber?'⚠️':'🚨',meta:`≥${mesesRecomendados} meses ✅ (según perfil)`,btn:{label:'💡 Ver recomendaciones',action:()=>setShowReservaModal(true)}},
                  {label:'Razón corriente',val:isFinite(ratios.razonCorriente)?ratios.razonCorriente.toFixed(2):'—',ok:ratios.razonCorriente>=1?'✅':'🚨',meta:'≥1.0 ✅',btn:{label:'✏️ Editar partidas',action:()=>setShowCorrienteModal(true)}},
                ]},
                {title:'🐷 AHORRO', cards:[
                  {label:'Tasa de ahorro',val:isFinite(ratios.tasaAhorro)?(ratios.tasaAhorro*100).toFixed(1)+'%':'—',ok:ratios.tasaAhorro>=0.30?'✅':ratios.tasaAhorro>=0.15?'⚠️':'🚨',meta:'≥30% ✅ · 15-29% ⚠️ · <15% 🚨'},
                  {label:'Cap. acumulación',val:isFinite(ratios.capAcum)?(ratios.capAcum*100).toFixed(1)+'%':'—',ok:ratios.capAcum>=0.30?'✅':ratios.capAcum>=0.10?'⚠️':'🚨',meta:'≥30% ✅ · 10-29% ⚠️ · <10% 🚨'},
                ]},
                {title:'🏦 DEUDA', cards:[
                  {label:'DTI neto',val:isFinite(ratios.dtiNeto)?(ratios.dtiNeto*100).toFixed(1)+'%':'—',ok:ratios.dtiNeto<=0.36?'✅':'🚨',meta:'≤36% ✅ · >36% 🚨'},
                  {label:'Pasivos / Activos',val:isFinite(ratios.deudaActivos)?(ratios.deudaActivos*100).toFixed(1)+'%':'—',ok:ratios.deudaActivos<=0.30?'✅':ratios.deudaActivos<=0.50?'⚠️':'🚨',meta:'≤30% ✅ · 30-50% ⚠️ · >50% 🚨'},
                ]},
                {title:'💎 PATRIMONIO', cards:[
                  {label:'Patrimonio / Activos',val:isFinite(ratios.patrimonioActivos)?(ratios.patrimonioActivos*100).toFixed(1)+'%':'—',ok:ratios.patrimonioActivos>=0.70?'✅':ratios.patrimonioActivos>=0.50?'⚠️':'🚨',meta:'≥70% ✅ · 50-69% ⚠️ · <50% 🚨'},
                  {label:'Inversión / Ingreso',val:isFinite(ratios.inversionRatio)?ratios.inversionRatio.toFixed(2)+'x':'—',ok:ratios.edad>=18&&ratios.inversionRatio>=getInvBm(ratios.edad)?'✅':'🚨',meta:ratios.edad>=18?`Meta: ${getInvBm(ratios.edad).toFixed(1)}x`:'Ver benchmark por edad',btn:{label:'📊 Benchmark',action:()=>setShowBenchmarkModal(true)}},
                  {label:'Nivel riqueza neta',val:isFinite(ratios.riquezaNeta)?ratios.riquezaNeta.toFixed(2)+'x':'—',ok:ratios.edad>=18&&ratios.riquezaNeta>=getRiqBm(ratios.edad).great?'✅':ratios.edad>=18&&ratios.riquezaNeta>=getRiqBm(ratios.edad).good?'⚠️':'🚨',meta:ratios.edad>=18?`Meta: ${getRiqBm(ratios.edad).good.toFixed(1)}x bueno · ${getRiqBm(ratios.edad).great.toFixed(1)}x excelente`:'Ver benchmark por edad',btn:{label:'📊 Benchmark',action:()=>setShowBenchmarkModal(true)}},

// ════════════════════════════════════════════════════════════════════════════
//  MetasPlan — Goals tracking and quantification
// ════════════════════════════════════════════════════════════════════════════
function MetasPlan({ goals, setGoals, ingresos, gastos = {}, totales, currency, userProfile }) {
  const [editingIdx, setEditingIdx] = React.useState(null);
  const [showAddModal, setShowAddModal] = React.useState(false);

  const fmtC = (v) => formatCurrency(v, currency);
  const ingresoBruto = ingresos.reduce((s,i)=>s+parseFloat(i.monto||0),0)*12;
  const ingresoBrutoMensual = ingresoBruto / 12;
  // Gastos corrientes mensuales (diarios = vida diaria, el verdadero "lifestyle cost")
  const gastosDiariosMensual = (gastos.diarios||[]).reduce((s,g)=>s+parseFloat(g.monto||0),0);

  const GOAL_META = {
    casa:          { icon:'🏠', label:'Comprar Casa',               color:'#3b82f6', bg:'#eff6ff' },
    retiro:        { icon:'🏖️', label:'Retiro Cómodo',              color:'#f59e0b', bg:'#fffbeb' },
    emergencia:    { icon:'🛡️', label:'Fondo de Emergencia',        color:'#10b981', bg:'#f0fdf4' },
    educacion:     { icon:'🎓', label:'Educación de Hijos',         color:'#8b5cf6', bg:'#f5f3ff' },
    viaje:         { icon:'✈️', label:'Viaje / Vacaciones',         color:'#06b6d4', bg:'#ecfeff' },
    deudas:        { icon:'💳', label:'Pagar Deudas',               color:'#ef4444', bg:'#fef2f2' },
    negocio:       { icon:'💼', label:'Iniciar Negocio',            color:'#6366f1', bg:'#eef2ff' },
    auto:          { icon:'🚗', label:'Comprar Auto',               color:'#64748b', bg:'#f8fafc' },
    inversiones:   { icon:'📈', label:'Hacer Crecer Dinero',        color:'#059669', bg:'#ecfdf5' },
    independencia: { icon:'🦅', label:'Independencia Financiera',   color:'#dc2626', bg:'#fef2f2' },
    herencia:      { icon:'🎁', label:'Dejar Herencia',             color:'#d97706', bg:'#fffbeb' },
    otro:          { icon:'🎯', label:'Otra Meta',                  color:'#7c3aed', bg:'#f5f3ff' },
  };

  const ALL_GOAL_KEYS = Object.keys(GOAL_META);

  // Computed fields per goal
  function computeGoal(g) {
    const d = g.details || {};
    const computed = {};

    if (g.key === 'retiro') {
      const edadActual    = parseInt(userProfile?.edad) || 40;
      const edadRetiro    = parseInt(d.edadRetiro) || 65;
      const ingresoMensual = parseFloat(d.ingresoMensual) || 0;
      const anosParaRetiro = Math.max(0, edadRetiro - edadActual);
      // Methodology: same as RetiroCalculator (PV of growing annuity)
      // 1) Project current income forward at 2.5%/yr to get nominal income at retirement
      // 2) Apply replacement ratio (desired income / current income)
      // 3) PV of growing annuity: dist rate 5%, inflation 3%, lifespan to 90
      const ingresoAnual       = ingresoBrutoMensual * 12;
      const tasaReemplazo      = ingresoBrutoMensual > 0 ? Math.round((ingresoMensual / ingresoBrutoMensual) * 100) : 80;
      const esperanzaVida      = 90;
      const anosDistribucion   = Math.max(0, esperanzaVida - edadRetiro);
      const ingresoFinalAnual  = ingresoAnual * Math.pow(1.025, anosParaRetiro);
      const ingresoNecAnual    = ingresoFinalAnual * (tasaReemplazo / 100);
      const tRA                = (1.05 / 1.03) - 1; // real adjusted rate
      let neededNest = 0;
      if (anosDistribucion > 0) {
        neededNest = Math.abs(tRA) > 0.00001
          ? ingresoNecAnual * (1 - Math.pow(1 + tRA, -anosDistribucion)) / tRA
          : ingresoNecAnual * anosDistribucion / 1.05;
      }
      computed.label1      = `Edad objetivo: ${edadRetiro} años`;
      computed.label2      = `${anosParaRetiro} años para lograrlo`;
      computed.label3      = `Tasa de reemplazo: ${tasaReemplazo}%`;
      computed.neededNest  = neededNest;
      computed.neededLabel = `Nido estimado (anualidad): ${formatCurrency(neededNest, currency)}`;
      computed.monthlyNeeded = anosParaRetiro > 0
        ? Math.round(neededNest / (anosParaRetiro * 12))
        : 0;
    }

    if (g.key === 'independencia') {
      const edadObj       = parseInt(d.edadObjetivo) || 50;
      const edadActual    = parseInt(userProfile?.edad) || 40;
      const anosRestantes = Math.max(0, edadObj - edadActual);
      // PMT = ingreso mensual pasivo deseado (del modal), o gastos diarios si no definido
      const pmtMensual     = parseFloat(d.ingresoMensual) || gastosDiariosMensual;
      const gastosAnuales  = pmtMensual * 12;
      const edadMortalidad = 95;
      const nAnios         = Math.max(1, edadMortalidad - edadActual);
      const rReal          = 0.03;
      const neededNest     = gastosAnuales * (1 - Math.pow(1 + rReal, -nAnios)) / rReal;
      computed.label1      = `¿Cuánto necesitas hoy para no trabajar más?`;
      computed.label2      = `Ingreso pasivo deseado: ${formatCurrency(pmtMensual, currency)}/mes`;
      computed.label3      = `Horizonte: hoy (${edadActual} años) → 95 (${nAnios} años)`;
      computed.neededNest  = neededNest;
      computed.neededLabel = `Número mágico (3% real, FV=0 a 95): ${formatCurrency(neededNest, currency)}`;
      computed.monthlyNeeded = anosRestantes > 0
        ? Math.round(Math.max(0, neededNest - totales.inversiones) / (anosRestantes * 12))
        : 0;
    }

    if (g.key === 'casa') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      const faltante = Math.max(0, precio * 0.2 - enganche);
      computed.label1 = d.tipo || '';
      computed.label2 = d.cuando ? `Plazo: ${d.cuando}` : '';
      computed.label3 = precio > 0 ? `Precio estimado: ${formatCurrency(precio, currency)}` : '';
      if (precio > 0) {
        computed.neededLabel = `Enganche 20%: ${formatCurrency(precio*0.2, currency)} · Tienes: ${formatCurrency(enganche, currency)} · Falta: ${formatCurrency(faltante, currency)}`;
      }
    }

    if (g.key === 'educacion') {
      const pph = parseFloat(d.presupuesto) || 0;
      const nhijos = parseInt(d.numHijos) || 1;
      const total = pph * nhijos;
      computed.label1 = d.numHijos ? `${d.numHijos} hijo(s)` : '';
      computed.label2 = d.anosInicio ? `Inicia en: ${d.anosInicio}` : '';
      computed.label3 = d.tipo || '';
      if (total > 0) computed.neededLabel = `Total estimado: ${formatCurrency(total, currency)} (${formatCurrency(pph, currency)} × ${nhijos})`;
    }

    if (g.key === 'viaje') {
      computed.label1 = d.destino ? `Destino: ${d.destino}` : '';
      computed.label2 = d.cuando ? `Cuándo: ${d.cuando}` : '';
      if (d.presupuesto) computed.neededLabel = `Presupuesto: ${formatCurrency(parseFloat(d.presupuesto)||0, currency)}`;
    }

    if (g.key === 'auto') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      computed.label1 = d.tipo || '';
      computed.label2 = d.cuando ? `Cuándo: ${d.cuando}` : '';
      if (precio > 0) computed.neededLabel = `Precio: ${formatCurrency(precio, currency)} · Enganche disp.: ${formatCurrency(enganche, currency)}`;
    }

    if (g.key === 'herencia') {
      computed.label1 = d.beneficiarios ? `Para: ${d.beneficiarios}` : '';
      computed.label2 = d.plazo ? `Plazo: ${d.plazo}` : '';
      if (d.monto) computed.neededLabel = `Objetivo: ${formatCurrency(parseFloat(d.monto)||0, currency)}`;
    }

    if (g.key === 'deudas') {
      const totalDeuda = Object.values(totales._deudas || {}).flat ? 0 : 0;
      computed.label1 = 'Eliminar todas las deudas';
      computed.label2 = `Deuda actual: ${formatCurrency(totales.pasivosTotales || 0, currency)}`;
      computed.neededLabel = `Ver calculadora "Salir de Deuda" para el plan detallado`;
    }

    if (g.key === 'emergencia') {
      const gastosMes = ingresoBrutoMensual * 0.6;
      const metaSeis  = gastosMes * 6;
      const disponible = totales.totalEfectivo || 0;
      computed.label1 = 'Reserva de 6+ meses de gastos';
      computed.label2 = `Liquidez actual: ${formatCurrency(disponible, currency)}`;
      computed.neededLabel = `Meta estimada (6 meses): ${formatCurrency(metaSeis, currency)}`;
    }

    if (g.key === 'inversiones' || g.key === 'negocio') {
      computed.label1 = g.key === 'inversiones' ? 'Incrementar inversiones activamente' : 'Iniciar o expandir negocio';
      computed.label2 = `Inversiones actuales: ${formatCurrency(totales.inversiones || 0, currency)}`;
    }

    if (g.key === 'otro') {
      computed.label1 = d.descripcion || '';
      computed.label2 = d.plazo ? `Plazo: ${d.plazo}` : '';
      if (d.monto) computed.neededLabel = `Objetivo: ${formatCurrency(parseFloat(d.monto)||0, currency)}`;
    }

    return computed;
  }

  // Progress bar width
  function getProgress(g) {
    const d = g.details || {};

        : (parseFloat(d.ingresoMensual)||0)*12*25;
      return needed > 0 ? Math.min(100, Math.round((totales.inversiones/needed)*100)) : 0;
    }
    if (g.key === 'emergencia') {
      const gastosMes = ingresoBrutoMensual * 0.6;
      const meta = gastosMes * 6;
      return meta > 0 ? Math.min(100, Math.round((totales.totalEfectivo/meta)*100)) : 0;
    }
    if (g.key === 'casa' || g.key === 'auto') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      const meta = precio * (g.key === 'casa' ? 0.2 : 0.15);
      return meta > 0 ? Math.min(100, Math.round((enganche/meta)*100)) : 0;

      {/* Add Modal */}
      {showAddModal && (

      )}
    </div>
  );
}

function RetiroCalculator({ userProfile, ingresos, activos, gastos = {}, goals = [] }) {
  const edadActual   = parseInt(userProfile?.edad) || 40;
  const ingresoAnual = Math.round(ingresos.reduce((s,i)=>s+parseFloat(i.monto||0),0)*12);
  const ahorroRetiro = Math.round((activos.retiro||[]).reduce((s,i)=>s+parseFloat(i.valor||0),0));
  const RETIRO_ITEMS = ['401(k)','403(b)','IRA/Roth','IRA Tradicional','Roth IRA','SEP IRA','Pensión','Anualidad'];
  const aporteRetiro = Math.round((gastos.ahorro||[])
    .filter(g => RETIRO_ITEMS.includes(g.categoria))
    .reduce((s,g)=>s+parseFloat(g.monto||0),0));
  const aporteAnual  = aporteRetiro * 12;
  const retiroGoal   = goals.find(g=>g.key==='retiro');
  const edadRetiro   = parseInt(retiroGoal?.details?.edadRetiro) || 65;
  const ingresoMes   = parseFloat(retiroGoal?.details?.ingresoMensual) || 0;
  const ratioReemplazo = ingresoAnual > 0 && ingresoMes > 0
    ? Math.round((ingresoMes / (ingresoAnual/12)) * 100) : 80;

  const [iframeSrc, setIframeSrc] = React.useState('');

  React.useEffect(() => {
    const b64 = window._RETIRO_CALC_B64;
    if (!b64) return;
    let html = atob(b64);
    html = html
      .replace('__EDAD_ACTUAL__',     String(edadActual))
      .replace('__EDAD_RETIRO__',     String(edadRetiro))
      .replace('__INGRESO_ANUAL__',   String(ingresoAnual > 0 ? ingresoAnual : 75000))
      .replace('__AHORRO_ACTUAL__',   String(ahorroRetiro))
      .replace('__APORTE_ANUAL__',    String(aporteAnual))
      .replace('__RATIO_REEMPLAZO__', String(ratioReemplazo));
    const blob = new Blob([html], {type: 'text/html'});
    const url  = URL.createObjectURL(blob);
    setIframeSrc(prev => { if (prev) URL.revokeObjectURL(prev); return url; });
  }, [edadActual, edadRetiro, ingresoAnual, ahorroRetiro, aporteAnual, ratioReemplazo]);

  const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

  return (
    <div style={{padding:'0'}}>
      <div style={{background:'#dbeafe',borderLeft:'4px solid #3b82f6',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',fontSize:'13px',color:'#1e40af'}}>
        <strong>Datos desde Money Map: </strong>
        Edad {edadActual} · Ingreso anual {fmt(ingresoAnual)} · Ahorros retiro {fmt(ahorroRetiro)} · Aporte mensual {fmt(aporteRetiro)} · Edad retiro {edadRetiro}
      </div>
      {iframeSrc
        ? <iframe
            src={iframeSrc}
            style={{width:'100%',height:'900px',border:'none',borderRadius:'10px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}
            title="Calculadora Retiro"
            sandbox="allow-scripts"
          />
        : <div style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'14px'}}>
            ⏳ Cargando calculadora...
          </div>
      }
    </div>
  );
}

function BenchmarkTables({ ingresoBruto }) {
  const ing = ingresoBruto || 0;
  const fmt$ = n => '$' + new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
  const fmtX = n => n.toFixed(2) + 'x';
  const ingLabel = ing > 0 ? `Ejemplo (${fmt$(ing)}/año)` : 'Ejemplo (ingreso del caso)';

  // Benchmarks at 5-year intervals
  const AGES = [25,30,35,40,45,50,55,60,65,70];

  // Inversión / Ingreso Bruto (Stanley-style)
  const invBm = {25:0.2,30:0.6,35:1.2,40:2.0,45:3.5,50:5.5,55:8.5,60:12.0,65:16.0,70:18.0};

  // Nivel de Riqueza Neta — good / great multiples of gross income
  const riqBm = {
    25:{good:2.5,great:5.0},30:{good:3.0,great:6.0},35:{good:3.5,great:7.0},
    40:{good:4.0,great:8.0},45:{good:4.5,great:9.0},50:{good:5.0,great:10.0},
    55:{good:5.5,great:11.0},60:{good:6.0,great:12.0},65:{good:6.5,great:13.0},70:{good:7.0,great:14.0}
  };

  // Ahorro para Retiro (Fidelity-style multiples)
  const retBm = {25:0.35,30:1.0,35:2.0,40:3.0,45:4.0,50:6.0,55:7.0,60:8.0,65:10.0,70:11.0};

  const tableStyle = {width:'100%',borderCollapse:'collapse',background:'#fff',borderRadius:'12px',overflow:'hidden',marginBottom:'24px'};
  const thStyle    = {padding:'12px 14px',textAlign:'left',fontWeight:'700',fontSize:'13px',color:'white'};
  const tdStyle    = (highlight) => ({padding:'11px 14px',borderBottom:'1px solid var(--border)',background:highlight?'#fffbeb':'white',fontWeight:highlight?'700':'400'});

  return (
    <div>
      {ing > 0 && (
        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'10px',padding:'12px 16px',marginBottom:'24px',fontSize:'14px',color:'#1d4ed8',fontWeight:'600'}}>
          📊 Columna "Ejemplo" calculada con el ingreso bruto del caso: <b>{fmt$(ing)}/año</b>
        </div>
      )}

      {/* Inversión / Ingreso */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>💰 Inversión / Ingreso Bruto</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Benchmark</th>
            {ing>0 && <th style={thStyle}>{ingLabel}</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(invBm[age])}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*invBm[age])}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Nivel de Riqueza Neta */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>💎 Nivel de Riqueza Neta</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Good ⚠️</th>
            {ing>0 && <th style={thStyle}>Ejemplo Good</th>}
            <th style={thStyle}>Great ✅</th>
            {ing>0 && <th style={thStyle}>Ejemplo Great</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(riqBm[age].good)}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*riqBm[age].good)}</td>}
                <td style={tdStyle(false)}>{fmtX(riqBm[age].great)}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*riqBm[age].great)}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Ahorro para Retiro */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>🏖️ Ahorro para Retiro</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Benchmark</th>
            {ing>0 && <th style={thStyle}>{ingLabel}</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(retBm[age])}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*retBm[age])}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ExportFooter({ totales, currency }) {
  return (
    <footer className="export-footer">
      <div className="export-footer-content">
        <div className="export-info">
          <div className="font-bold">Xavier Serbia Money Map</div>
          <div className="text-muted" style={{fontSize:'0.85rem',marginTop:'0.25rem'}}>
            Patrimonio Neto: <span className="currency font-bold" style={{color:totales.patrimonioNeto>=0?'var(--success)':'var(--danger)'}}>{formatCurrency(totales.patrimonioNeto,currency)}</span>
          </div>
          <div style={{fontSize:'0.75rem',color:'var(--text-muted)',marginTop:'0.5rem',maxWidth:'500px'}}>Esta herramienta proporciona análisis financiero educativo. No constituye asesoramiento financiero, legal o fiscal profesional.</div>
        </div>
      </div>
    </footer>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>

<script>
// ── window helpers called from React ──────────────────────────────────────
window.abrirReporteModal = function() {
  var el = document.getElementById('reporteModalOverlay');
  if (!el) { alert('Modal no encontrado'); return; }
  // populate recommendations
  var recos = window.generarRecos();
  var ta = document.getElementById('reporte_recos');
  if (ta) ta.value = recos;
  el.style.display = 'flex';
};
window.cerrarReporteModal = function() {
  var el = document.getElementById('reporteModalOverlay');
  if (el) el.style.display = 'none';
};

window.generarRecos = function() {
  var state = window.mmState || {};
  var totales = state.totales || {};
  var ratios  = state.ratiosData || {};
  var profile = state.userProfile || {};
  var cur     = state.currency || 'USD';
  var sym     = {USD:'$',EUR:'€',GBP:'£',MXN:'$',COP:'$',ARS:'$',CLP:'$',PEN:'S/',BRL:'R$',CAD:'C$'};
  var s       = sym[cur] || '$';
  var fc      = function(v) { return s + Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0}); };
  var lines   = [];

  if (totales.patrimonioNeto >= 0)
    lines.push('Patrimonio neto positivo de ' + fc(totales.patrimonioNeto) + '. Continuar estrategia de acumulacion.');
  else
    lines.push('Patrimonio neto negativo (' + fc(totales.patrimonioNeto) + '). Prioridad: reducir pasivos.');

  var ing = totales.totalIngresos || 0;
  var gas = totales.totalGastos   || 0;
  var tasa = ing > 0 ? ((ing - gas) / ing * 100) : 0;
  if (tasa >= 20)      lines.push('Tasa de ahorro excelente: ' + tasa.toFixed(0) + '%. Mantener disciplina.');
  else if (tasa >= 10) lines.push('Tasa de ahorro del ' + tasa.toFixed(0) + '%. Meta recomendada: 20%.');
  else                 lines.push('Tasa de ahorro baja: ' + tasa.toFixed(0) + '%. Revisar presupuesto urgente.');

  var re = ratios.reservaEmergencia;
  if (re) {
    if (re.valor >= 6) lines.push('Fondo de emergencia adecuado (' + re.valor.toFixed(1) + ' meses). Mantener en HYSA.');
    else               lines.push('Fondo de emergencia insuficiente (' + re.valor.toFixed(1) + ' meses). Meta: 6+ meses.');
  }
  var di = ratios.deudaIngreso;
  if (di) {
    if (di.valor <= 36) lines.push('Ratio deuda/ingreso saludable (' + di.valor.toFixed(0) + '%). Bajo el limite del 36%.');
    else                lines.push('Ratio deuda/ingreso elevado (' + di.valor.toFixed(0) + '%). Priorizar amortizacion.');
  }

  lines.push('');
  lines.push('PROXIMOS PASOS:');
  lines.push('- Revisar y actualizar beneficiarios en cuentas de retiro');
  lines.push('- Programar revision trimestral del portfolio');
  lines.push('- Evaluar incremento en aportes 401(k) para capturar employer match');

  return lines.join('\n');
};

window.generarPDF = function() {
  var btn = document.getElementById('reporte_generar_btn');
  if (btn) { btn.textContent = 'Generando...'; btn.disabled = true; }

  setTimeout(function() {
    try {
      _generarPDF();
    } catch(e) {
      alert('Error al generar PDF: ' + e.message);
      console.error(e);
    }
    if (btn) { btn.innerHTML = '📄 Descargar PDF'; btn.disabled = false; }
  }, 50);
};

function _generarPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var W = 210, H = 297;

  var state    = window.mmState || {};
  var totales  = state.totales  || {};
  var ratios   = state.ratiosData || {};
  var profile  = state.userProfile || {};
  var ingresos = state.ingresos || [];
  var gastos   = state.gastos   || {};
  var activos  = state.activos  || {};
  var deudas   = state.deudas   || {};
  var goals    = state.goals    || [];
  var cur      = state.currency || 'USD';

  var sym = {USD:'$',EUR:'€',GBP:'£',MXN:'$',COP:'$',ARS:'$',CLP:'$',PEN:'S/',BRL:'R$',CAD:'C$'};
  var cs  = sym[cur] || '$';
  var fc  = function(v) { return cs + Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0}); };
  var pct = function(v) { return Number(v||0).toFixed(1) + '%'; };

  // Color palette
  var navy   = [15,23,66];
  var blue   = [57,86,232];
  var green  = [16,185,129];
  var amber  = [245,158,11];
  var red    = [239,68,68];
  var purple = [139,92,246];
  var teal   = [6,182,212];
  var dark   = [30,41,59];
  var gray   = [100,116,139];
  var white  = [255,255,255];
  var offwh  = [248,249,255];
  var lgray  = [226,232,240];

  function setFill(rgb) { doc.setFillColor(rgb[0],rgb[1],rgb[2]); }
  function setTxt(rgb)  { doc.setTextColor(rgb[0],rgb[1],rgb[2]); }
  function setDraw(rgb) { doc.setDrawColor(rgb[0],rgb[1],rgb[2]); }

  function box(x,y,w,h,rgb) { setFill(rgb); doc.rect(x,y,w,h,'F'); }
  function rbox(x,y,w,h,r,rgb) { setFill(rgb); doc.roundedRect(x,y,w,h,r,r,'F'); }
  function text(t,x,y,sz,rgb,align,bold) {
    doc.setFontSize(sz);
    setTxt(rgb);
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.text(String(t||''), x, y, {align: align||'left'});
  }
  function hline(x1,y1,x2,y2,rgb,lw) {
    setDraw(rgb);
    doc.setLineWidth(lw||0.3);
    doc.line(x1,y1,x2,y2);
  }
  function pbar(x,y,w,val,rgb,bg) {
    rbox(x,y,w,4,2,bg||[226,232,240]);
    var fw = Math.min(Math.max(val/100,0),1)*w;
    if(fw>0) rbox(x,y,fw,4,2,rgb);
  }

  function pageFooter(n) {
    box(0,H-8,W,8,navy);
    text('Xavier Serbia · Money Map',12,H-2,6,[120,140,200]);
    text('Pag. '+n, W/2, H-2, 6, [120,140,200], 'center');
    text('Confidencial', W-12, H-2, 6, [120,140,200], 'right');
  }

  var nombre = ((profile.nombre||'') + ' ' + (profile.apellido||'')).trim() || 'Cliente';
  var fecha  = new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'});

  // ── PAGE 1: COVER ────────────────────────────────────────────────────────
  box(0,0,W,H,navy);
  box(0,0,W,3,blue);
  box(0,0,3,H,green);

  text('XAVIER SERBIA', 16, 28, 10, [99,131,246], 'left', true);
  text('MONEY MAP',     16, 36,  8, [120,150,220]);

  text('DIAGNOSTICO',  16,  78, 30, white,       'left', true);
  text('FINANCIERO',   16,  97, 30, green,       'left', true);
  text('PERSONAL',     16, 116, 30, [150,170,255],'left', true);

  box(16,122,80,2,green);
  box(16,122,40,2,blue);

  // Client card
  rbox(14,140,W-28,60,4,[20,35,90]);
  box(14,140,5,60,green);
  text('PREPARADO PARA:', 26, 153,  8, teal,  'left', true);
  text(nombre,           26, 168, 20, white,  'left', true);
  if (profile.analisisConjunto && profile.parejaNombre)
    text('& ' + profile.parejaNombre, 26, 178, 12, [150,200,255]);
  var ageLine = [profile.edad && (profile.edad+' anos'), profile.estadoCivil, profile.dependientes > 0 && (profile.dependientes+' dep.')].filter(Boolean).join('  |  ');
  text(ageLine, 26, 188, 7, [120,160,210]);
  text(fecha,   W-16, 153, 8, [120,160,210], 'right');

  // Mini KPIs on cover
  var kdata = [
    {l:'Patrimonio Neto', v:fc(totales.patrimonioNeto),    c: totales.patrimonioNeto>=0 ? green : red},
    {l:'Ingresos / mes',  v:fc((totales.totalIngresos||0)/12), c:blue},
    {l:'Activos Totales', v:fc(totales.activosTotales),    c:purple},
    {l:'Deudas Totales',  v:fc(totales.pasivosTotales),    c:amber},
  ];
  var kw = (W-28-18)/4;
  for (var ki=0; ki<kdata.length; ki++) {
    var kx = 14 + ki*(kw+6);
    rbox(kx, 210, kw, 26, 3, [20,35,90]);
    box(kx, 210, kw, 2, kdata[ki].c);
    text(kdata[ki].l, kx+kw/2, 221, 6,  [150,180,230], 'center');
    text(kdata[ki].v, kx+kw/2, 230, 10, kdata[ki].c,   'center', true);
  }

  box(0,H-6,W,6,green);
  text('Generado con Xavier Serbia Money Map', W/2, H-10, 7, [80,120,180], 'center');

  // ── PAGE 2: RESUMEN EJECUTIVO ─────────────────────────────────────────────
  doc.addPage();
  box(0,0,W,H,offwh);
  box(0,0,W,26,blue);
  text('RESUMEN EJECUTIVO',         12, 12, 15, white, 'left', true);
  text('Metricas clave · Semaforo financiero', 12, 21,  8, [200,220,255]);
  text(nombre, W-12, 12, 8, [200,220,255], 'right');
  text(fecha,  W-12, 21, 7, [170,190,255], 'right');
  pageFooter(2);

  var y = 32;
  // 6 KPI cards 2x3
  var kpis2 = [
    {l:'Patrimonio Neto',  v:fc(totales.patrimonioNeto),                                     c:totales.patrimonioNeto>=0?green:red},
    {l:'Ingresos / mes',   v:fc((totales.totalIngresos||0)/12),                               c:blue},
    {l:'Activos Totales',  v:fc(totales.activosTotales),                                      c:purple},
    {l:'Deudas Totales',   v:fc(totales.pasivosTotales),                                      c:amber},
    {l:'Flujo libre / mes',v:fc(((totales.totalIngresos||0)-(totales.totalGastos||0))/12),    c:(totales.totalIngresos||0)>=(totales.totalGastos||0)?green:red},
    {l:'Retiro total',     v:fc(totales.totalRetiro),                                         c:teal},
  ];
  var kw2 = (W-24-10)/3;
  for (var i=0; i<kpis2.length; i++) {
    var kcol = i%3, krow = Math.floor(i/3);
    var kx2 = 12 + kcol*(kw2+5);
    var ky2 = y + krow*30;
    rbox(kx2, ky2, kw2, 26, 3, kpis2[i].c);
    text(kpis2[i].l, kx2+4, ky2+8,  7,  white, 'left');
    text(kpis2[i].v, kx2+4, ky2+18, 12, white, 'left', true);
  }
  y += 68;

  // Ratios semaphore rows
  text('INDICADORES FINANCIEROS', 12, y, 9, dark, 'left', true);
  hline(12, y+2, 72, y+2, blue, 0.5);
  y += 8;

  function semRow(x, ry, label, valueStr, isGood) {
    var bg  = isGood === true ? [240,253,244] : isGood === false ? [255,241,241] : [255,251,235];
    var acc = isGood === true ? green : isGood === false ? red : amber;
    var tag = isGood === true ? 'CUMPLIDO' : isGood === false ? 'ATENCION' : 'EN CAMINO';
    rbox(x, ry, 90, 16, 3, bg);
    box(x, ry, 4, 16, acc);
    text(label,     x+8, ry+7,  7,   dark,  'left', true);
    text(valueStr,  x+8, ry+13, 8,   acc,   'left', true);
    rbox(x+62, ry+3, 24, 10, 3, acc);
    text(tag,  x+74, ry+9, 6, white, 'center', true);
  }

  var r = ratios;
  var semRows = [
    {l:'Reserva Emergencia',   v:(r.reservaEmergencia&&r.reservaEmergencia.valor!=null)?r.reservaEmergencia.valor.toFixed(1)+' meses':'N/A', g: r.reservaEmergencia ? (r.reservaEmergencia.valor>=6 ? true : r.reservaEmergencia.valor>=4 ? null : false) : null},
    {l:'Deuda / Ingreso',      v:(r.deudaIngreso&&r.deudaIngreso.valor!=null)?pct(r.deudaIngreso.valor):'N/A',                               g: r.deudaIngreso ? (r.deudaIngreso.valor<=36 ? true : r.deudaIngreso.valor<=50 ? null : false) : null},
    {l:'Tasa de Ahorro',       v:(r.tasaAhorro&&r.tasaAhorro.valor!=null)?pct(r.tasaAhorro.valor):'N/A',                                     g: r.tasaAhorro ? (r.tasaAhorro.valor>=20 ? true : r.tasaAhorro.valor>=10 ? null : false) : null},
    {l:'Razon Corriente',      v:(r.razonCorriente&&r.razonCorriente.valor!=null)?r.razonCorriente.valor.toFixed(2)+'x':'N/A',                g: r.razonCorriente ? (r.razonCorriente.valor>=1 ? true : r.razonCorriente.valor>=0.5 ? null : false) : null},
    {l:'Inversion / Ingreso',  v:(r.inversionIngreso&&r.inversionIngreso.valor!=null)?r.inversionIngreso.valor.toFixed(1)+'x':'N/A',         g: r.inversionIngreso ? (r.inversionIngreso.valor>=1 ? true : r.inversionIngreso.valor>=0.5 ? null : false) : null},
    {l:'Nivel Riqueza Neta',   v:(r.riquezaNeta&&r.riquezaNeta.valor!=null)?r.riquezaNeta.valor.toFixed(1)+'x':'N/A',                        g: r.riquezaNeta ? (r.riquezaNeta.valor>=1 ? true : r.riquezaNeta.valor>=0.5 ? null : false) : null},
  ];
  for (var si=0; si<semRows.length; si++) {
    semRow(12 + (si%2)*97, y + Math.floor(si/2)*20, semRows[si].l, semRows[si].v, semRows[si].g);
  }
  y += 68;

  // Savings rate bar
  var ingM = (totales.totalIngresos||0)/12;
  var gasM = (totales.totalGastos||0)/12;
  var tasa2 = ingM > 0 ? ((ingM-gasM)/ingM*100) : 0;
  rbox(12, y, W-24, 20, 3, offwh);
  text('TASA DE AHORRO', 18, y+8, 7, dark, 'left', true);
  text(pct(tasa2), W-16, y+8, 11, tasa2>=20?green:tasa2>=10?amber:red, 'right', true);
  pbar(18, y+13, W-36, tasa2, tasa2>=20?green:tasa2>=10?amber:red);

  // ── PAGE 3: FLUJO DE CAJA ─────────────────────────────────────────────────
  doc.addPage();
  box(0,0,W,H,offwh);
  box(0,0,W,26,teal);
  text('FLUJO DE CAJA', 12, 12, 15, white, 'left', true);
  text('Ingresos · Gastos · Ahorro mensual', 12, 21, 8, [200,245,245]);
  text(nombre, W-12, 12, 8, [200,245,245], 'right');
  pageFooter(3);

  y = 32;
  var bw3 = (W-24-10)/3;
  var flu  = ingM - gasM;
  var cards3 = [
    {l:'INGRESOS / MES', v:fc(ingM), c:green},
    {l:'GASTOS / MES',   v:fc(gasM), c:red},
    {l:'FLUJO LIBRE',    v:fc(flu),  c:flu>=0?teal:red},
  ];
  for (var ci=0; ci<cards3.length; ci++) {
    rbox(12+ci*(bw3+5), y, bw3, 30, 3, cards3[ci].c);
    text(cards3[ci].l, 12+ci*(bw3+5)+4, y+9,  7,  white, 'left');
    text(cards3[ci].v, 12+ci*(bw3+5)+4, y+21, 13, white, 'left', true);
  }
  y += 38;

  // Income breakdown table
  text('DETALLE DE INGRESOS', 12, y+8, 8, dark, 'left', true);
  y += 12;
  var ingRows = [];
  for (var ii=0; ii<Math.min(ingresos.length,10); ii++) {
    var ing2 = ingresos[ii];
    var monto = parseFloat(ing2.monto)||0;
    var pctVal = ingM > 0 ? (monto/ingM*100) : 0;
    ingRows.push([ing2.nombre||'Ingreso', ing2.categoria||'', fc(monto), pct(pctVal)]);
  }
  doc.autoTable({
    startY: y, head:[['Fuente','Categoria','Mensual','%']],
    body: ingRows.length ? ingRows : [['Sin ingresos registrados','','','']],
    theme:'grid', margin:{left:12,right:12},
    headStyles:{fillColor:[6,182,212],textColor:[255,255,255],fontStyle:'bold',fontSize:7},
    bodyStyles:{fontSize:7,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[240,253,252]},
    columnStyles:{2:{halign:'right'},3:{halign:'right'}},
  });

  // ── PAGE 4: BALANCE GENERAL ───────────────────────────────────────────────
  doc.addPage();
  box(0,0,W,H,offwh);
  box(0,0,W,26,purple);
  text('BALANCE GENERAL', 12, 12, 15, white, 'left', true);
  text('Activos · Pasivos · Patrimonio neto', 12, 21, 8, [220,200,255]);
  text(nombre, W-12, 12, 8, [220,200,255], 'right');
  pageFooter(4);

  y = 32;
  var hw = (W-24-6)/2;
  rbox(12, y, hw, 26, 3, purple);
  text('ACTIVOS TOTALES', 18, y+9,  7,  white, 'left');
  text(fc(totales.activosTotales), 18, y+20, 13, white, 'left', true);
  rbox(18+hw, y, hw, 26, 3, amber);
  text('PASIVOS TOTALES', 24+hw, y+9,  7,  white, 'left');
  text(fc(totales.pasivosTotales), 24+hw, y+20, 13, white, 'left', true);
  y += 32;

  var pnColor = (totales.patrimonioNeto||0) >= 0 ? green : red;
  rbox(12, y, W-24, 16, 3, (totales.patrimonioNeto||0)>=0 ? [232,252,244] : [255,232,232]);
  box(12, y, 4, 16, pnColor);
  text('PATRIMONIO NETO', 20, y+7, 8, dark, 'left', true);
  text(fc(totales.patrimonioNeto), W-14, y+7, 13, pnColor, 'right', true);
  y += 22;

  // Asset bars
  text('COMPOSICION DE ACTIVOS', 12, y+7, 8, dark, 'left', true);
  y += 12;
  var actTotal = totales.activosTotales || 1;
  var actCats = [
    {l:'Efectivo / Liquidez', v:totales.totalEfectivo||0,        c:teal},
    {l:'Inversiones',         v:totales.totalInversiones||0,     c:blue},
    {l:'Retiro (401k/IRA)',   v:totales.totalRetiro||0,          c:amber},
    {l:'Bienes Raices',       v:totales.totalBienesRaices||0,    c:green},
    {l:'Bienes Personales',   v:totales.totalBienesPersonales||0,c:purple},
  ];
  for (var ai=0; ai<actCats.length; ai++) {
    var ap = actCats[ai].v / actTotal * 100;
    rbox(12, y, W-24, 10, 2, [248,250,252]);
    box(12, y, 3, 10, actCats[ai].c);
    text(actCats[ai].l, 20, y+7, 7, dark);
    pbar(70, y+3, 80, ap, actCats[ai].c);
    text(pct(ap),           154, y+7, 6, actCats[ai].c, 'right');
    text(fc(actCats[ai].v), W-12, y+7, 7, dark, 'right', true);
    y += 12;
  }

  y += 4;
  text('COMPOSICION DE DEUDAS', 12, y+7, 8, dark, 'left', true);
  y += 12;
  var pasTotal = totales.pasivosTotales || 1;
  var dCats = [
    {l:'Hipotecas',       v:(deudas.casa||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0),         c:amber},
    {l:'Tarjetas',        v:(deudas.tarjetas||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0),     c:red},
    {l:'Auto',            v:(deudas.auto||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0),         c:purple},
    {l:'HELOC/Propiedad', v:(deudas.lineaPropiedad||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0),c:blue},
    {l:'Prestamos pers.', v:(deudas.lineaPersonal||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0), c:teal},
    {l:'Otros',           v:(deudas.otros||[]).reduce(function(s,i){return s+parseFloat(i.balance||0);},0),         c:gray},
  ];
  for (var di2=0; di2<dCats.length; di2++) {
    if (dCats[di2].v <= 0) continue;
    var dp = dCats[di2].v / pasTotal * 100;
    rbox(12, y, W-24, 10, 2, [255,250,250]);
    box(12, y, 3, 10, dCats[di2].c);
    text(dCats[di2].l, 20, y+7, 7, dark);
    pbar(70, y+3, 80, dp, dCats[di2].c, [255,220,220]);
    text(pct(dp),           154, y+7, 6, dCats[di2].c, 'right');
    text(fc(dCats[di2].v),  W-12, y+7, 7, dark, 'right', true);
    y += 12;
  }

  // ── PAGE 5: METAS ─────────────────────────────────────────────────────────
  if (goals.length > 0) {
    doc.addPage();
    box(0,0,W,H,offwh);
    box(0,0,W,26,green);
    text('METAS FINANCIERAS', 12, 12, 15, white, 'left', true);
    text('Objetivos · Estado · Progreso', 12, 21, 8, [200,255,220]);
    text(nombre, W-12, 12, 8, [200,255,220], 'right');
    pageFooter(5);

    y = 32;
    var goalLabels = {retiro:'Retiro comodo',emergencia:'Fondo emergencia',casa:'Comprar casa',educacion:'Educacion hijos',deudas:'Pagar deudas',inversiones:'Crecer dinero',independencia:'Independencia financiera',negocio:'Negocio propio',auto:'Comprar auto',viaje:'Viaje / Vacaciones',herencia:'Dejar herencia',otro:'Otra meta'};
    var goalColors2 = {completado:green,'en progreso':blue,pendiente:amber,'no aplica':gray};

    for (var gi=0; gi<Math.min(goals.length,10); gi++) {
      var g = goals[gi];
      var gc = goalColors2[g.status] || amber;
      var gl = goalLabels[g.key] || g.key;
      var gs = ((g.status||'pendiente')).toUpperCase();
      rbox(12, y, W-24, 18, 3, gi%2===0 ? offwh : [240,242,255]);
      box(12, y, 4, 18, gc);
      text(gl, 20, y+8, 9, dark, 'left', true);
      if (g.notes) {
        var noteText = g.notes.substring(0,80) + (g.notes.length>80?'...':'');
        text(noteText, 20, y+14, 6, gray);
      }
      rbox(W-46, y+4, 34, 10, 3, gc);
      text(gs, W-29, y+10, 6, white, 'center', true);
      y += 21;
    }
  }

  // ── PAGE 6: RECOMENDACIONES ───────────────────────────────────────────────
  doc.addPage();
  box(0,0,W,H,offwh);
  box(0,0,W,26,[15,120,80]);
  text('RECOMENDACIONES DEL COACH', 12, 12, 14, white, 'left', true);
  text('Plan de accion personalizado',      12, 21,  8, [180,255,210]);
  text(nombre, W-12, 12, 8, [180,255,210], 'right');
  pageFooter(6);

  y = 32;
  var recos = (document.getElementById('reporte_recos')||{}).value || window.generarRecos();
  var notas = (document.getElementById('reporte_notas')||{}).value || '';

  var recoLines = doc.splitTextToSize(recos, W-28);
  for (var ri=0; ri<recoLines.length; ri++) {
    if (y > H-18) { doc.addPage(); box(0,0,W,H,offwh); pageFooter('...'); y=16; }
    var rl = recoLines[ri];
    var lineColor = dark;
    var lineSize  = 8;
    if (rl.indexOf('excelente')>-1 || rl.indexOf('adecuado')>-1 || rl.indexOf('saludable')>-1) lineColor = green;
    else if (rl.indexOf('baja')>-1 || rl.indexOf('negativo')>-1 || rl.indexOf('insuficiente')>-1 || rl.indexOf('elevado')>-1) lineColor = red;
    else if (rl.indexOf('PROXIMOS')>-1) { lineSize=9; lineColor=[15,120,80]; }
    doc.setFontSize(lineSize);
    setTxt(lineColor);
    doc.setFont('helvetica','normal');
    doc.text(rl, 14, y);
    y += 6;
  }

  if (notas.trim()) {
    y += 4;
    rbox(12, y, W-24, 10, 3, [240,253,244]);
    text('NOTAS ADICIONALES', 18, y+7, 7, green, 'left', true);
    y += 14;
    var notaLines = doc.splitTextToSize(notas, W-28);
    for (var ni=0; ni<notaLines.length; ni++) {
      doc.setFontSize(8); setTxt(dark); doc.setFont('helvetica','normal');
      doc.text(notaLines[ni], 14, y);
      y += 6;
    }
  }

  // Signatures
  if (y + 30 < H-15) {
    y += 12;
    hline(14, y, 80, y, lgray, 0.5);
    text('Firma del Coach / Asesor', 14, y+6, 7, gray);
    hline(W-80, y, W-14, y, lgray, 0.5);
    text('Firma del Cliente', W-80, y+6, 7, gray);
  }

  var safeName = nombre.replace(/\s+/g,'_');
  doc.save('MoneyMap_Reporte_' + safeName + '_' + new Date().toISOString().slice(0,10) + '.pdf');
}
</script>

</body>
</html>
