<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Simulador Móvil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0e17;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 2rem 1rem;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .toolbar-label {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .device-btn {
    padding: 0.4rem 0.875rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.5rem;
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .device-btn:hover, .device-btn.active {
    background: #5B4CE2;
    border-color: #5B4CE2;
    color: white;
  }

  /* Phone shell */
  .phone-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .phone {
    position: relative;
    background: #1a1a1a;
    border-radius: 44px;
    box-shadow:
      0 0 0 2px #3a3a3a,
      0 0 0 4px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    transition: all 0.3s ease;
  }

  /* Dynamic Island */
  .phone-notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #0a0a0a;
    border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    right: -3px;
    top: 120px;
    width: 3px;
    height: 70px;
    background: #2a2a2a;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 90px 0 #2a2a2a;
  }

  .phone::after {
    content: '';
    position: absolute;
    left: -3px;
    top: 100px;
    width: 3px;
    height: 40px;
    background: #2a2a2a;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 55px 0 #2a2a2a, 0 105px 0 #2a2a2a;
  }

  .phone-screen {
    border-radius: 36px;
    overflow: hidden;
    background: white;
    position: relative;
  }

  .phone-screen iframe {
    display: block;
    border: none;
    width: 100%;
    height: 100%;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 28px 0;
    z-index: 5;
    pointer-events: none;
  }

  .status-time {
    font-size: 0.8rem;
    font-weight: 700;
    color: #1c1917;
    letter-spacing: -0.02em;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-icons svg {
    width: 16px;
    height: 16px;
    fill: #1c1917;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: rgba(0,0,0,0.25);
    border-radius: 3px;
    z-index: 10;
  }

  /* iPhone 14 Pro */
  .iphone-14 .phone {
    width: 375px;
    padding: 12px;
  }
  .iphone-14 .phone-screen {
    width: 351px;
    height: 760px;
  }

  /* iPhone SE */
  .iphone-se .phone {
    width: 320px;
    padding: 12px;
    border-radius: 36px;
  }
  .iphone-se .phone-screen {
    width: 296px;
    height: 568px;
    border-radius: 26px;
  }
  .iphone-se .phone-notch {
    display: none;
  }
  .iphone-se .phone {
    border-radius: 36px;
  }

  /* Android */
  .android .phone {
    width: 390px;
    padding: 10px;
    border-radius: 30px;
  }
  .android .phone-screen {
    width: 370px;
    height: 800px;
    border-radius: 22px;
  }
  .android .phone-notch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    top: 16px;
  }

  .info {
    margin-top: 1.5rem;
    color: rgba(255,255,255,0.25);
    font-size: 0.7rem;
    text-align: center;
    letter-spacing: 0.05em;
  }
</style>
</head>

<body>

    <!-- Money Map Summary Modal -->

    <!-- Demo Controls Panel -->
    <script src=&quot;https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js&quot;></script>
    <script>
        // ===== DATA =====
        const steps = [
            { id: 'discovery', name: 'Discovery',  icon: 'message-square', order: 1 },
            { id: 'videocall', name: 'Presentación', icon: 'video',          order: 2 },
            { id: 'cerrado',   name: 'Cerrado',     icon: 'award',          order: 3 }
        ];

        const stepContent = {
            discovery: {
                title: 'Completa el Discovery',
                description: 'Este formulario es la base del análisis. Mientras más completo, mejor. Si te falta info, puedes guardarlo y volver.',
                checklist: [
                    { item: 'Formulario iniciado', done: false },
                    { item: 'Información básica completada', done: false },
                    { item: 'Discovery enviado para revisión', done: false }
                ],
                cta: { text: 'Completar Discovery', action: 'discovery' },
                discoveryStatus: {
                    status: 'not_started',
                    progress: 0,
                    lastUpdated: null,
                    link: 'https://xserbia.github.io/xavierserbia-site/discovery-form-claude.html',
                    summary: { businessName: '', industry: '', currentRevenue: '', goals: '' }
                }
            },
            videocall: {
                title: 'Tu Presentación de Resultados',
                description: 'Hemos preparado un video personalizado con el análisis completo de tu negocio. Míralo a tu ritmo y si tienes preguntas, escríbenos por WhatsApp.',
                checklist: [
                    { item: 'Presentación lista', done: false },
                    { item: 'Video visto', done: false },
                    { item: 'Preguntas resueltas', done: false }
                ],
                cta: null,
                videoReady: false,
                videoUrl: '',
                whatsappNumber: '15551234567',
                whatsappMessage: 'Hola, acabo de ver mi presentación de resultados y tengo una pregunta:'
            },
            cerrado: {
                title: 'Proceso completado',
                description: 'Se entrega el resumen final y próximos pasos. Si tienes seguimiento mensual, aquí inicia el ciclo de check-ins.',
                checklist: [
                    { item: 'Resumen final entregado', done: false }
                ],
                cta: null,
                finalDocuments: [
                    {
                        name: 'Resumen Final del Análisis',
                        description: 'Documento completo con hallazgos, insights y recomendaciones estratégicas',
                        size: '2.4 MB', pages: 24, type: 'pdf',
                        status: 'available', icon: 'file-text', url: '#'
                    }
                ]
            }
        };

        let currentStep = 'discovery';
        let selectedStep = 'discovery';
        let notes = {};
        let selectedSlotData = null;

        // ===== INIT =====
        function init() {
            loadNotes();
            renderTimeline();
            updateProgress();
            updateContent();
            lucide.createIcons();
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 100px; right: 2rem;
                background: #5B4CE2; color: white;
                padding: 1rem 1.5rem; border-radius: 0.75rem;
                box-shadow: 0 10px 15px -3px rgba(91,76,226,0.4);
                z-index: 1001; font-weight: 500; font-size: 0.875rem;
                animation: slideInRight 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease-out';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        // ===== DISCOVERY =====
        function openDiscoveryForm() {
            const ds = stepContent.discovery.discoveryStatus;
            window.open(ds.link, '_blank');
            showNotification('🚀 Abriendo formulario Discovery en nueva pestaña');
            if (ds.status === 'not_started') {
                setTimeout(() => {
                    ds.status = 'in_progress'; ds.progress = 10;
                    ds.lastUpdated = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
                    stepContent.discovery.checklist[0].done = true;
                    updateContent();
                    showNotification('✓ Discovery iniciado - Progreso guardado automáticamente');
                }, 2000);
            }
        }

        function simulateDiscoveryCompletion() {
            const ds = stepContent.discovery.discoveryStatus;
            ds.status = 'completed'; ds.progress = 100;
            ds.lastUpdated = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
            ds.summary = { businessName: 'Tech Solutions Inc.', industry: 'Tecnología y Software', currentRevenue: '$500K - $1M anuales', goals: 'Aumentar conversión web en 30%, optimizar funnel de ventas, implementar automatización de marketing' };
            stepContent.discovery.checklist.forEach(item => { item.done = true; });
            updateContent();
            showNotification('✅ Discovery completado - Respuestas enviadas para revisión');
        }

        function simulateDiscoveryProgress() {
            if (selectedStep !== 'discovery') { showNotification('⚠️ Primero selecciona el paso Discovery'); return; }
            const ds = stepContent.discovery.discoveryStatus;
            const now = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
            if (ds.status === 'not_started') {
                ds.status = 'in_progress'; ds.progress = 35; ds.lastUpdated = now;
                stepContent.discovery.checklist[0].done = true;
                updateContent(); showNotification('📝 Discovery iniciado - Progreso: 35%');
            } else if (ds.status === 'in_progress' &amp;&amp; ds.progress < 100) {
                ds.progress = Math.min(ds.progress + 30, 100); ds.lastUpdated = now;
                if (ds.progress >= 70) stepContent.discovery.checklist[1].done = true;
                if (ds.progress === 100) {
                    ds.status = 'completed';
                    stepContent.discovery.checklist[2].done = true;
                    ds.summary = { businessName: 'Tech Solutions Inc.', industry: 'Tecnología y Software', currentRevenue: '$500K - $1M anuales', goals: 'Aumentar conversión web en 30%, optimizar funnel de ventas, implementar automatización de marketing' };
                    showNotification('✅ Discovery completado - 100%');
                } else { showNotification(`📝 Progreso actualizado - ${ds.progress}%`); }
                updateContent();
            } else { showNotification('✓ El Discovery ya está completado'); }
        }

        // ===== VIDEOCALL (pre-produced video + WhatsApp) =====
        function handlePlayVideo() {
            const vc = stepContent.videocall;
            if (vc.videoUrl) {
                window.open(vc.videoUrl, '_blank');
            } else {
                showNotification('▶️ En producción aquí se reproducirá el video personalizado');
            }
            setTimeout(() => {
                vc.checklist[0].done = true;
                vc.checklist[1].done = true;
                updateContent();
            }, 1500);
        }

        function markVideoWatched() {
            const vc = stepContent.videocall;
            vc.checklist[0].done = true;
            vc.checklist[1].done = true;
            updateContent();
            showNotification('✅ ¡Video marcado como visto!');
        }

        function openWhatsApp() {
            const vc = stepContent.videocall;
            const msg = encodeURIComponent(vc.whatsappMessage);
            window.open(`https://wa.me/${vc.whatsappNumber}?text=${msg}`, '_blank');
            stepContent.videocall.checklist[2].done = true;
            updateContent();
        }

        // ===== CERRADO =====
        function addNextMeetingToCalendar() {
            const meeting = stepContent.cerrado.nextMeeting;
            showNotification('📅 Agregando reunión de coaching a tu calendario...');
            setTimeout(() => showNotification('✓ Reunión agregada: ' + meeting.title + ' - ' + meeting.date), 1500);
        }

        function previewFinalDocument(index) {
            const doc = stepContent.cerrado.finalDocuments[index];
            showNotification(`📄 Abriendo vista previa: ${doc.name}`);
            setTimeout(() => showNotification('Esta es una demostración. En producción se mostraría el PDF completo.'), 1500);
        }

        function downloadFinalDocument(index) {
            const doc = stepContent.cerrado.finalDocuments[index];
            showNotification(`⬇️ Descargando: ${doc.name}`);
            setTimeout(() => showNotification('✓ Documento descargado correctamente'), 1000);
        }

        function simulateFinalDocsAvailable() {
            if (selectedStep !== 'cerrado') { showNotification('⚠️ Primero selecciona el paso Cerrado'); return; }
            stepContent.cerrado.finalDocuments.forEach(doc => { doc.status = 'available'; });
            stepContent.cerrado.checklist[0].done = true;
            updateContent();
            showNotification('✅ Documentos finales ahora disponibles para descargar');
        }

        // ===== NOTES =====
        function loadNotes() {
            const saved = localStorage.getItem('userDashboardNotes');
            if (saved) notes = JSON.parse(saved);
        }

        function saveNote() {
            notes[selectedStep] = document.getElementById('notesTextarea').value;
            localStorage.setItem('userDashboardNotes', JSON.stringify(notes));
            showNotification('💾 Nota guardada correctamente');
        }

        // ===== TIMELINE =====
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            steps.forEach(step => {
                const status = getStepStatus(step);
                const accessible = isStepAccessible(step);
                const button = document.createElement('button');
                button.className = 'step-btn';
                if (selectedStep === step.id) button.classList.add('active');
                if (!accessible) button.disabled = true;
                button.onclick = () => selectStep(step.id);

                const iconClass = status === 'completed' ? 'completed' : status === 'current' ? 'current' : 'pending';
                const iconName = status === 'completed' ? 'check-circle' : (!accessible ? 'lock' : step.icon);

                button.innerHTML = `
                    <div class=&quot;step-icon ${iconClass} ${selectedStep === step.id ? 'active' : ''}&quot;>
                        <i data-lucide=&quot;${iconName}&quot; style=&quot;width: 18px; height: 18px;&quot;></i>
                    </div>
                    <div class=&quot;step-info&quot;>
                        <div class=&quot;step-name&quot;>${step.name}</div>
                        <div class=&quot;step-status&quot;>${status === 'completed' ? 'Completado' : status === 'current' ? 'En progreso' : 'Pendiente'}</div>
                    </div>
                    ${selectedStep === step.id ? '<i data-lucide=&quot;chevron-right&quot; style=&quot;width: 14px; height: 14px;&quot;></i>' : ''}
                `;
                timeline.appendChild(button);
            });
            lucide.createIcons();
        }

        function isStepAccessible(step) {
            const currentIdx = steps.findIndex(s => s.id === currentStep);
            const stepIdx = steps.findIndex(s => s.id === step.id);
            return stepIdx <= currentIdx;
        }

        function getStepStatus(step) {
            const currentIdx = steps.findIndex(s => s.id === currentStep);
            const stepIdx = steps.findIndex(s => s.id === step.id);
            if (step.id === 'cerrado' &amp;&amp; stepContent.cerrado.nextMeeting) return 'completed';
            if (stepIdx < currentIdx) return 'completed';
            if (stepIdx === currentIdx) return 'current';
            return 'pending';
        }

        function selectStep(stepId) {
            if (!isStepAccessible(steps.find(s => s.id === stepId))) return;
            selectedStep = stepId;
            renderTimeline();
            updateContent();
            document.getElementById('notesTextarea').value = notes[selectedStep] || '';
        }

        function updateProgress() {
            const completed = steps.filter(s => getStepStatus(s) === 'completed').length;
            const pct = (completed / steps.length) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${completed}/${steps.length}`;
        }

        // ===== CONTENT RENDER =====
        function updateContent() {
            const content = stepContent[selectedStep];
            const stepName = steps.find(s => s.id === selectedStep).name;

            // Clear next meeting banner (no longer used)
            document.getElementById('nextMeetingBanner').innerHTML = '';

            // Update video area based on state

            const videoPlaceholder = document.querySelector('.video-placeholder');
            if (selectedStep === 'videocall' &amp;&amp; !content.videoReady) {
                videoPlaceholder.innerHTML = `
                    <div class=&quot;video-locked-overlay&quot;>
                        <div class=&quot;video-locked-icon&quot;>
                            <i data-lucide=&quot;lock&quot; style=&quot;width:24px;height:24px;color:rgba(255,255,255,0.6);&quot;></i>
                        </div>
                        <div class=&quot;video-locked-text&quot;>
                            <div class=&quot;video-locked-title&quot;>Presentación en preparación</div>
                            <div class=&quot;video-locked-sub&quot;>Disponible pronto</div>
                        </div>
                    </div>`;
            } else {
                videoPlaceholder.innerHTML = `
                    <div class=&quot;video-content&quot;>
                        <button class=&quot;play-button&quot; onclick=&quot;${selectedStep === 'videocall' ? 'handlePlayVideo()' : ''}&quot;>
                            <i data-lucide=&quot;play&quot; style=&quot;width: 36px; height: 36px; color: white; margin-left: 4px;&quot;></i>
                        </button>
                        <p class=&quot;video-text&quot; id=&quot;videoText&quot;>Video explicativo - ${content.title}</p>
                    </div>`;
            }
            document.getElementById('contentTitle').textContent = content.title;
            document.getElementById('contentDescription').textContent = content.description;
            document.getElementById('notesStepName').textContent = stepName;

            // Checklist
            const checklist = document.getElementById('checklist');
            checklist.innerHTML = '';
            content.checklist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `
                    <div class=&quot;checklist-icon ${item.done ? 'done' : 'pending'}&quot;>
                        <i data-lucide=&quot;${item.done ? 'check-circle' : 'circle'}&quot; style=&quot;width: 20px; height: 20px;&quot;></i>
                    </div>
                    <span class=&quot;checklist-text ${item.done ? 'done' : 'pending'}&quot;>${item.item}</span>`;
                checklist.appendChild(div);
            });

            // Auto-advance to next step when checklist is fully complete
            const allDone = content.checklist.every(item => item.done);
            const currentIdx = steps.findIndex(s => s.id === selectedStep);
            const nextStep = steps[currentIdx + 1];
            if (allDone &amp;&amp; nextStep &amp;&amp; currentStep === selectedStep) {
                setTimeout(() => {
                    currentStep = nextStep.id;
                    selectedStep = nextStep.id;
                    renderTimeline();
                    updateProgress();
                    updateContent();
                    document.getElementById('notesTextarea').value = notes[selectedStep] || '';
                    showNotification(`✅ ¡Listo! Avanzando a ${nextStep.name}`);
                }, 600);
                return;
            }

            // Remove old dynamic sections
            document.querySelectorAll('.discovery-status-section, .videocall-section, .final-documents-section').forEach(el => el.remove());

            const ctaContainer = document.getElementById('ctaContainer');
            const dynamicSection = document.getElementById('dynamicSection');
            dynamicSection.innerHTML = '';

            if (selectedStep === 'discovery') {
                dynamicSection.innerHTML = buildDiscoveryHTML();
                ctaContainer.innerHTML = '';
            } else if (selectedStep === 'videocall') {
                dynamicSection.innerHTML = buildVideocallHTML();
                ctaContainer.innerHTML = '';
            } else if (selectedStep === 'cerrado') {
                dynamicSection.innerHTML = buildFinalDocsHTML();
                ctaContainer.innerHTML = '';
            } else if (content.cta) {
                ctaContainer.innerHTML = `<button class=&quot;cta-button&quot; onclick=&quot;handleCTA('${content.cta.action}')&quot;>${content.cta.text}</button>`;
            } else {
                ctaContainer.innerHTML = '';
            }

            lucide.createIcons();
        }

                return;
            }
            showNotification('Procesando acción...');
        }

        window.addEventListener('DOMContentLoaded', init);

        // ===== DEV TOGGLE (remove in production) =====
        function toggleVideoReady() {
            const vc = stepContent.videocall;
            vc.videoReady = !vc.videoReady;
            if (vc.videoReady) {
                vc.checklist[0].done = true;
                vc.checklist[1].done = true;
                vc.checklist[2].done = true;
            } else {
                vc.checklist[0].done = false;
                vc.checklist[1].done = false;
                vc.checklist[2].done = false;
            }
            if (selectedStep === 'videocall') updateContent();
            const btn = document.getElementById('devToggleBtn');
            btn.textContent = vc.videoReady ? '🔒 Simular: video en preparación' : '▶️ Simular: video publicado';
        }
    </script>
</body>

<script>
  // Live clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Device switcher
  function setDevice(type) {
    const wrap = document.getElementById('phoneWrap');
    wrap.className = `phone-wrap ${type}`;

    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    // Show/hide notch
    const notch = document.getElementById('notch');
    if (type === 'iphone-se') {
      notch.style.display = 'none';
    } else {
      notch.style.display = 'block';
      notch.style.borderRadius = type === 'android' ? '50%' : '20px';
      notch.style.width = type === 'android' ? '12px' : '120px';
      notch.style.height = type === 'android' ? '12px' : '34px';
    }
  }
</script>
