<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XS Members — Tablero (Desktop)</title>

  <link rel="stylesheet" href="https://cadamenudo.github.io/UI-UX/css-fonts.css"/>

  <style>
    :root{
      --primary:#3956E8;
      --secondary:#7459D9;
      --accent:#E8C239;
      --bg:#f3f5f9;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --stroke:#e5e7eb;
      --shadow:0 14px 34px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Nunito",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* ===== Layout ===== */
    .app{ display:flex; min-height:100vh; }

    /* ===== Sidebar ===== */
    .sidebar{
      width:290px;
      background:#fff;
      border-right:1px solid var(--stroke);
      padding:26px 22px;
      display:flex;
      flex-direction:column;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 10px 18px;
      margin-bottom:10px;
    }
    .brand .logo{
      width:44px;height:44px;border-radius:12px;
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      display:grid;place-items:center;
      color:#fff;font-weight:900;
    }
    .brand .name{
      font-weight:900;
      letter-spacing:.2px;
      font-size:18px;
      line-height:1.1;
    }
    .nav{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }
    .nav a{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:var(--text);
      font-weight:700;
      padding:12px 14px;
      border-radius:14px;
      transition:.15s ease;
      cursor:pointer;
      user-select:none;
    }
    .nav a:hover{ background:#f2f5ff; }
    .nav a.active{ background:var(--primary); color:#fff; }

    .nav .section-title{
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      margin:14px 10px 6px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .subnav{
      margin-left:12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .subnav a{
      padding:10px 12px;
      font-weight:700;
      color:#1f2937;
      border-radius:12px;
      background:transparent;
    }
    .subnav a:hover{ background:#f7f7fb; }
    .subnav a.active{ background:#eef2ff; color:var(--primary); }

    /* ===== Main ===== */
    .main{ flex:1; padding:26px 28px; }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    /* ===== Top Bar ===== */
    .topBar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:22px;
      gap:16px;
    }

    .welcomeCard{
      padding:18px 22px;
      display:flex;
      align-items:center;
      min-height:86px;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
      flex:1;
    }
    .welcomeTitle{
      font-size:34px;
      font-weight:1000;
      letter-spacing:-.02em;
      line-height:1.05;
      white-space:nowrap;
    }

    /* ===== Profile Block ===== */
    .profileBlock{
      display:flex;
      align-items:center;
      gap:12px;
      background:#fff;
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:12px 18px;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
      cursor:pointer;
      user-select:none;
      transition:.15s ease;
      flex:0 0 auto;
    }
    .profileBlock:hover{ box-shadow:0 14px 30px rgba(57,86,232,.10); transform:translateY(-1px); }

    .profileAvatar{
      width:46px;height:46px;border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      display:grid;place-items:center;
      color:#fff;
      font-weight:1000;
      font-size:18px;
      flex:0 0 auto;
      border:2px solid #c7d2fe;
    }
    .profileInfo{
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .profileName{
      font-weight:1000;
      font-size:15px;
      color:#0f172a;
      line-height:1.1;
    }
    .profilePlan{
      font-size:11px;
      font-weight:900;
      color:var(--primary);
      background:#eef2ff;
      padding:3px 8px;
      border-radius:999px;
      display:inline-block;
      letter-spacing:.04em;
    }
    .profileChevron{
      color:var(--muted);
      font-size:12px;
      margin-left:4px;
    }

    .muted{ color:var(--muted); font-weight:800; }

    @media (max-width: 1100px){
      .sidebar{ width:260px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="brand">
        <div class="logo">FM</div>
        <div>
          <div class="name">Xavier</div>
          <div class="muted" style="font-size:12px;margin-top:2px;">Formula Menudo</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a class="active" data-key="tablero">Tablero</a>
        <a data-key="radiografia">Tu Radiografía</a>
        <a data-key="metas">Tus Metas</a>
        <a data-key="pax">Pregúntale a Xavier</a>

        <div class="section-title">Conocimiento</div>
        <div class="subnav">
          <a data-key="cursos">Cursos</a>
        </div>

        <a data-key="herramientas">Herramientas</a>
        <a data-key="coach">Tu Coach</a>

        <div style="flex:1;min-height:32px;"></div>
        <a data-key="signout" style="color:#ef4444;margin-top:auto;">
          <span style="font-size:16px;">⏻</span> Sign Out
        </a>
      </nav>
    </aside>

    <main class="main">

      <div class="topBar">
        <div class="card welcomeCard">
          <div class="welcomeTitle">Bienvenido, Frank 👋</div>
        </div>

        <div class="profileBlock">
          <div class="profileAvatar">F</div>
          <div class="profileInfo">
            <div class="profileName">Frank García</div>
            <div class="profilePlan">✦ Members Pro</div>
          </div>
          <span class="profileChevron">▾</span>
        </div>
      </div>

    </main>
  </div>

  <script>
    // Sidebar active
    const nav = document.getElementById('nav');
    nav.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if(!a) return;
      [...nav.querySelectorAll('a')].forEach(x => x.classList.remove('active'));
      a.classList.add('active');
    });
  </script>
</body>
</html>
