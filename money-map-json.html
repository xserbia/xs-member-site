// ============= RUNWAY CALCULATOR =============
function RunwayCalculator({ activos, gastos, ingresos, deudas, currency }) {
  const { useState, useEffect, useMemo } = React;

  const ASSET_CATS = [
    { id:'cash',          label:'Cash y equivalentes', icon:'💵', color:'#16a34a', bg:'#f0fdf4', border:'#bbf7d0', liquidity:1, liqLabel:'Inmediato'   },
    { id:'inversiones',   label:'Inversiones',          icon:'📈', color:'#2563eb', bg:'#eff6ff', border:'#bfdbfe', liquidity:3, liqLabel:'1–4 semanas' },
    { id:'retiro',        label:'Cuentas de retiro',    icon:'🏛️', color:'#7c3aed', bg:'#f5f3ff', border:'#ddd6fe', liquidity:4, liqLabel:'1–3 meses'  },
    { id:'bienes_raices', label:'Bienes raíces',        icon:'🏘️', color:'#ea580c', bg:'#fff7ed', border:'#fed7aa', liquidity:6, liqLabel:'6+ meses'   },
    { id:'negocio',       label:'Negocio / Otros',      icon:'🏢', color:'#0d9488', bg:'#f0fdfa', border:'#99f6e4', liquidity:5, liqLabel:'3–6 meses'  },
    { id:'personales',    label:'Activos personales',   icon:'🚗', color:'#db2777', bg:'#fdf2f8', border:'#fbcfe8', liquidity:5, liqLabel:'3–6 meses'  },
  ];

  const EXPENSE_CATS = [
    { id:'impuestos',      label:'Impuestos',      icon:'🏛️' },
    { id:'gastos_diarios', label:'Gastos diarios', icon:'🛒' },
    { id:'seguros',        label:'Seguros',        icon:'🛡️' },
    { id:'deuda',          label:'Deuda (sin auto)',icon:'💳' },
    { id:'casa',           label:'Casa / HOA',     icon:'🏠' },
  ];

  const mmToCat = { efectivo:'cash', inversiones:'inversiones', retiro:'retiro', bienesRaices:'bienes_raices', bienesPersonales:'personales' };

  // Map asset category → related debt keys for netting
  const debtForCat = {
    bienesRaices: ['casa', 'lineaPropiedad'],   // home value - mortgage - HELOC
    efectivo:     ['tarjetas', 'lineaPersonal'], // liquid assets - revolving debt
    // autos excluded — assumed sold to pay off auto loan, net = 0
  };

  const mmAssets = useMemo(() => {
    // Pre-compute debt totals per key
    const debtTotals = {};
    if (deudas) {
      Object.entries(deudas).forEach(([key, items]) => {
        debtTotals[key] = (items || []).reduce((s,i) => s + parseNumber(i.balance), 0);
      });
    }

    // For each asset category, figure out how much debt to net out
    // Distribute debt proportionally across assets in that category
    const debtUsed = {};  // track debt already allocated

    const list = [];
    Object.entries(activos).forEach(([key, items]) => {
      if (key === 'bienesPersonales') return; // autos excluded — sell to pay debt, net = 0
      const catId   = mmToCat[key] || 'negocio';
      const relKeys = debtForCat[key] || [];

      // Total gross value for this category
      const catGross = items.reduce((s,i) => s + parseNumber(i.valor), 0);

      // Total applicable debt for this category (not yet used)
      let catDebt = relKeys.reduce((s, dk) => {
        const used = debtUsed[dk] || 0;
        return s + Math.max(0, (debtTotals[dk] || 0) - used);
      }, 0);

      items.forEach(item => {
        const gross = parseNumber(item.valor);
        if (gross <= 0) return;

        // Prorate debt to this item
        const itemDebt = catGross > 0 ? catDebt * (gross / catGross) : 0;
        const net      = Math.max(0, gross - itemDebt);

        const label = item.ubicacion || item.tipo || catId;
        const entry = { id:`${key}-${item.tipo}-${item.ubicacion}`, categoryId:catId, label, amount:net, gross, debt:itemDebt };
        if (net > 0) list.push(entry);
      });

      // Mark this debt as used
      relKeys.forEach(dk => { debtUsed[dk] = (debtTotals[dk] || 0); });
    });
    return list;
  }, [activos, deudas]);

  const mmExpenses = useMemo(() => {
    // Auto loan payments excluded — auto assumed sold to cancel debt
    const deudaItems = (gastos.deuda || []);
    const autoPayment = deudaItems
      .filter(i => /auto|carro|veh/i.test(i.tipo || i.subcategoria || ''))
      .reduce((s,i) => s + parseNumber(i.monto), 0);
    return {
      impuestos:      (gastos.impuestos ||[]).reduce((s,i)=>s+parseNumber(i.monto),0),
      gastos_diarios: (gastos.diarios   ||[]).reduce((s,i)=>s+parseNumber(i.monto),0),
      seguros:        (gastos.seguros   ||[]).reduce((s,i)=>s+parseNumber(i.monto),0),
      deuda:          Math.max(0, deudaItems.reduce((s,i)=>s+parseNumber(i.monto),0) - autoPayment),
      casa:           0,
      // Ahorro excluido — en emergencia el ahorro se detiene
    };
  }, [gastos]);

  const [assetList, setAssets]   = useState(mmAssets);
  const [expVals,   setExpVals]  = useState(mmExpenses);
  const [result,    setResult]   = useState(null);
  const [editExp,   setEditExp]  = useState(false);
  const [expDraft,  setExpDraft] = useState(mmExpenses);
  const [showAddAsset, setShowAddAsset] = useState(false);
  const [assetDraft,   setADraft]       = useState({ categoryId:'cash', label:'', amount:'' });

  useEffect(() => { setAssets(mmAssets); }, [JSON.stringify(mmAssets)]);
  useEffect(() => { setExpVals(mmExpenses); setExpDraft(mmExpenses); }, [JSON.stringify(mmExpenses)]);

  // Auto-calculate always
  useEffect(() => {
    const gap  = Object.values(expVals).reduce((s,v)=>s+(parseFloat(v)||0),0);
    const tAss = assetList.reduce((s,a)=>s+a.amount,0);
    if (gap > 0 && tAss > 0) {
      const sorted = [...assetList].sort((a,b)=>{
        const ca=ASSET_CATS.find(c=>c.id===a.categoryId);
        const cb=ASSET_CATS.find(c=>c.id===b.categoryId);
        return (ca?.liquidity||3)-(cb?.liquidity||3);
      });
      setResult({ totalMonths:tAss/gap, gap, tAss, sorted });
    } else { setResult(null); }
  }, [assetList, expVals]);

  const fmt = n => '$'+new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
  const fmtMonths = m => {
    if(!isFinite(m)||m<=0) return '—';
    if(m>=12){ const y=Math.floor(m/12),mo=Math.round(m%12); return mo>0?`${y}a ${mo}m`:`${y} año${y>1?'s':''}`; }
    return `${m.toFixed(1)} meses`;
  };
  const rColor  = m => m>=24?'#16a34a':m>=12?'#0d9488':m>=6?'#d97706':m>=3?'#ea580c':'#dc2626';
  const rBg     = m => m>=24?'#f0fdf4':m>=12?'#f0fdfa':m>=6?'#fffbeb':m>=3?'#fff7ed':'#fef2f2';
  const rBorder = m => m>=24?'#bbf7d0':m>=12?'#99f6e4':m>=6?'#fde68a':m>=3?'#fed7aa':'#fecaca';
  const rLabel  = m => {
    const fmtM = n => {
      if (!isFinite(n)||n<=0) return '—';
      if (n>=12){ const y=Math.floor(n/12),mo=Math.round(n%12); return mo>0?`${y} año${y>1?'s':''} y ${mo} mes${mo>1?'es':''}`:`${y} año${y>1?'s':''}`; }
      return `${n.toFixed(1)} meses`;
    };
    return `Sin ingresos, tus activos netos cubren ${fmtM(m)} de gastos esenciales.`;
  };

  const totalExp = Object.values(expVals).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const totalAss = assetList.reduce((s,a)=>s+a.amount,0);

  const cardSt = { background:'white', borderRadius:'16px', border:'1px solid var(--border)', padding:'1.25rem', boxShadow:'0 1px 3px rgba(0,0,0,0.04)', marginBottom:'1rem' };
  const labelSt = { fontSize:'11px', fontWeight:'700', letterSpacing:'1px', color:'#94a3b8', marginBottom:'6px' };
  const editBtnSt = { padding:'6px 14px', background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:'8px', color:'#1d4ed8', fontSize:'12px', fontWeight:'700', cursor:'pointer', fontFamily:'inherit' };
  const overlayS = { position:'fixed', inset:0, background:'rgba(15,23,42,0.55)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:'16px' };
  const modalS   = { background:'white', borderRadius:'20px', width:'100%', maxWidth:'480px', maxHeight:'90vh', overflowY:'auto', boxShadow:'0 24px 64px rgba(0,0,0,0.2)', padding:'24px' };

  return (
    <div style={{maxWidth:'680px',margin:'0 auto'}}>

      {/* ── Gastos card */}
      <div style={cardSt}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
          <div>
            <div style={labelSt}>GASTOS MENSUALES</div>
            <div style={{fontWeight:'900',fontSize:'1.75rem',color:'#0f172a'}}>{fmt(totalExp)}<span style={{fontSize:'1rem',fontWeight:'600',color:'#94a3b8'}}>/mes</span></div>
          </div>
          <button style={editBtnSt} onClick={()=>{setExpDraft({...expVals});setEditExp(true);}}>✎ Editar</button>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'7px'}}>
          {EXPENSE_CATS.filter(c=>parseFloat(expVals[c.id])>0).map(c=>(
            <div key={c.id} style={{display:'flex',alignItems:'center',gap:'5px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'5px 11px',fontSize:'12px',fontWeight:'600',color:'#475569'}}>
              {c.icon} {c.label} <span style={{color:'#0f172a',fontWeight:'800'}}>{fmt(expVals[c.id])}</span>
            </div>
          ))}
          {totalExp === 0 && <span style={{fontSize:'13px',color:'#cbd5e1',fontWeight:'600'}}>Sin gastos registrados</span>}
        </div>
      </div>

      {/* ── Activos card */}
      <div style={cardSt}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
          <div>
            <div style={labelSt}>ACTIVOS DISPONIBLES</div>
            <div style={{fontWeight:'900',fontSize:'1.75rem',color:'#0f172a'}}>{fmt(totalAss)}</div>
          </div>
          <button style={editBtnSt} onClick={()=>setShowAddAsset(true)}>+ Añadir</button>
        </div>
        {assetList.length === 0 && <div style={{fontSize:'13px',color:'#cbd5e1',fontWeight:'600'}}>Sin activos registrados</div>}
        {ASSET_CATS.map(cat => {
          const group = assetList.filter(a=>a.categoryId===cat.id);
          if(!group.length) return null;
          return (
            <div key={cat.id} style={{marginBottom:'10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'6px'}}>
                <div style={{width:'24px',height:'24px',borderRadius:'7px',background:cat.bg,border:`1px solid ${cat.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px'}}>{cat.icon}</div>
                <span style={{fontSize:'11px',fontWeight:'800',color:cat.color}}>{cat.label}</span>
                <span style={{fontSize:'10px',color:'#94a3b8'}}>· {cat.liqLabel}</span>
              </div>
              {group.map(a=>(
                <div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',borderRadius:'9px',background:'#fafafa',marginBottom:'3px'}}>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:'600',color:'#334155'}}>{a.label}</div>
                    {a.debt > 0 && <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'1px'}}>Bruto {fmt(a.gross)} − Deuda {fmt(a.debt)}</div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'14px',fontWeight:'800',color: a.debt>0?'#059669':'#0f172a'}}>{fmt(a.amount)}</div>
                      {a.debt > 0 && <div style={{fontSize:'10px',fontWeight:'700',color:'#059669'}}>neto</div>}
                    </div>
                    <button onClick={()=>setAssets(p=>p.filter(x=>x.id!==a.id))} style={{background:'none',border:'none',color:'#d1d5db',fontSize:'14px',cursor:'pointer',padding:'2px 5px',borderRadius:'5px'}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      {/* ── Result */}
      {!result && totalExp > 0 && totalAss === 0 && (
        <div style={{textAlign:'center',padding:'2rem',color:'#94a3b8',fontSize:'14px',fontWeight:'600'}}>Agrega activos para ver el runway →</div>
      )}
      {!result && totalExp === 0 && (
        <div style={{textAlign:'center',padding:'2rem',color:'#94a3b8',fontSize:'14px',fontWeight:'600'}}>Edita los gastos mensuales para ver el runway →</div>
      )}

      {result && (() => {
        const { totalMonths, gap, tAss, sorted } = result;
        const col = rColor(totalMonths);
        const bg  = rBg(totalMonths);
        const brd = rBorder(totalMonths);
        return (
          <div style={{background:'white',borderRadius:'16px',border:`2px solid ${brd}`,padding:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)',marginBottom:'1rem'}}>

            {/* Big number */}
            <div style={{textAlign:'center',padding:'8px 0 20px'}}>
              <div style={{fontSize:'11px',color:'#94a3b8',fontWeight:'700',marginBottom:'8px',letterSpacing:'1px'}}>RUNWAY TOTAL</div>
              <div style={{fontWeight:'900',fontSize:'60px',lineHeight:'1',letterSpacing:'-3px',color:col}}>{fmtMonths(totalMonths)}</div>
              <div style={{fontSize:'13px',color:'#94a3b8',marginTop:'10px',fontWeight:'500'}}>{fmt(tAss)} en activos ÷ {fmt(gap)}/mes</div>
            </div>

            {/* Status */}
            <div style={{borderRadius:'10px',padding:'12px 16px',textAlign:'center',marginBottom:'1.5rem',background:'#f8fafc',border:'1px solid #e2e8f0'}}>
              <span style={{fontSize:'13px',fontWeight:'600',color:'#475569'}}>{rLabel(totalMonths)}</span>
            </div>

            {/* Liquidation order */}
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'12px'}}>ORDEN DE LIQUIDACIÓN</div>
            {sorted.map(a=>{
              const cat = ASSET_CATS.find(c=>c.id===a.categoryId);
              const pct = (a.amount/tAss*100).toFixed(2);
              const mos = (a.amount/gap).toFixed(1);
              return (
                <div key={a.id} style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <span style={{fontSize:'16px'}}>{cat?.icon}</span>
                      <div>
                        <div style={{fontSize:'13px',fontWeight:'700',color:'#334155'}}>{a.label}</div>
                        <div style={{fontSize:'10px',fontWeight:'700',color:cat?.color}}>{cat?.liqLabel}</div>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'13px',fontWeight:'800',color: a.debt>0?'#059669':'#0f172a'}}>{fmt(a.amount)}{a.debt>0 && <span style={{fontSize:'10px',fontWeight:'600',color:'#059669',marginLeft:'4px'}}>neto</span>}</div>
                      <div style={{fontSize:'11px',fontWeight:'700',color:cat?.color}}>{mos} meses</div>
                    </div>
                  </div>
                  <div style={{height:'8px',background:'#f1f5f9',borderRadius:'4px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:cat?.color,borderRadius:'4px',opacity:0.8}}/>
                  </div>
                </div>
              );
            })}

            {/* Cumulative Timeline */}
            {(() => {
              // Build cumulative segments with month markers
              let cumMonths = 0;
              const segs = sorted.map(a => {
                const cat   = ASSET_CATS.find(c=>c.id===a.categoryId);
                const mos   = a.amount / gap;
                const start = cumMonths;
                cumMonths  += mos;
                const pct   = (mos / totalMonths * 100).toFixed(2);
                return { ...a, cat, mos, start, end: cumMonths, pct };
              });
              // Tick marks: every 6 months up to totalMonths
              const tickInterval = totalMonths <= 12 ? 3 : totalMonths <= 36 ? 6 : 12;
              const ticks = [];
              for (let t = 0; t <= Math.ceil(totalMonths); t += tickInterval) {
                if (t > totalMonths) break;
                ticks.push(t);
              }
              if (ticks[ticks.length-1] < totalMonths) ticks.push(Math.round(totalMonths));
              return (
                <div style={{marginTop:'16px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'14px'}}>
                  <div style={{fontSize:'11px',fontWeight:'700',color:'#94a3b8',letterSpacing:'1px',marginBottom:'9px'}}>LÍNEA DE TIEMPO ACUMULATIVA</div>
                  {/* Strip */}
                  <div style={{display:'flex',height:'30px',borderRadius:'8px',overflow:'hidden',gap:'2px'}}>
                    {segs.map(s=>(
                      <div key={s.id} title={`${s.label}: mes ${s.start.toFixed(1)} → ${s.end.toFixed(1)}`}
                        style={{width:`${s.pct}%`,background:s.cat?.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',borderRadius:'5px',flexShrink:'0',overflow:'hidden',position:'relative'}}>
                        {s.pct>7 ? s.cat?.icon : ''}
                      </div>
                    ))}
                  </div>
                  {/* Cumulative month ticks */}
                  <div style={{position:'relative',marginTop:'6px',height:'18px'}}>
                    {ticks.map(t=>{
                      const leftPct = (t / totalMonths * 100);
                      return (
                        <div key={t} style={{position:'absolute',left:`${leftPct}%`,transform:'translateX(-50%)',fontSize:'11px',color:'#94a3b8',fontWeight:'600',whiteSpace:'nowrap'}}>
                          {t===0 ? 'Hoy' : `Mes ${t}`}
                        </div>
                      );
                    })}
                  </div>
                  {/* Legend */}
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'14px'}}>
                    {segs.map(s=>(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',fontWeight:'600',color:'#475569'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'3px',background:s.cat?.color,flexShrink:'0'}}/>
                        <span>{s.label}</span>
                        <span style={{color:s.cat?.color,fontWeight:'800'}}>→ mes {Math.round(s.end)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        );
      })()}

      <div style={{fontSize:'11px',color:'#cbd5e1',textAlign:'center',lineHeight:'1.8',fontWeight:'500',paddingBottom:'1rem'}}>
        Asume gastos constantes. No considera rendimientos, inflación ni costos de liquidación.
      </div>

      {/* ── Edit Expenses Modal */}
      {editExp && (
        <div style={overlayS} onClick={e=>{if(e.target===e.currentTarget)setEditExp(false);}}>
          <div style={modalS}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
              <div><div style={{fontWeight:'900',fontSize:'1.2rem'}}>Gastos Mensuales</div><div style={{fontSize:'12px',color:'#94a3b8'}}>Pre-cargados desde tu Money Map</div></div>
              <button onClick={()=>setEditExp(false)} style={{background:'#f1f5f9',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'16px',color:'#64748b'}}>✕</button>
            </div>
            {EXPENSE_CATS.map(cat=>(
              <div key={cat.id} style={{marginBottom:'12px'}}>
                <div style={{fontSize:'13px',fontWeight:'700',marginBottom:'5px'}}>{cat.icon} {cat.label}</div>
                <div style={{display:'flex',alignItems:'center',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',overflow:'hidden'}}>
                  <span style={{padding:'0 12px',color:'#94a3b8',fontWeight:'700'}}>$</span>
                  <input type="number" placeholder="0" value={expDraft[cat.id]||''}
                    onChange={e=>setExpDraft(d=>({...d,[cat.id]:e.target.value}))}
                    style={{flex:'1',background:'transparent',border:'none',padding:'11px 4px',fontSize:'15px',fontWeight:'800',fontFamily:'inherit',color:'#0f172a'}}/>
                  <span style={{padding:'0 12px',color:'#94a3b8',fontSize:'12px',fontWeight:'600'}}>/mes</span>
                </div>
              </div>
            ))}
            <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'12px',padding:'12px 16px',display:'flex',justifyContent:'space-between',margin:'16px 0'}}>
              <span style={{fontWeight:'700',color:'#1d4ed8',fontSize:'13px'}}>Total mensual</span>
              <span style={{fontWeight:'900',fontSize:'1.25rem',color:'#1d4ed8'}}>{fmt(Object.values(expDraft).reduce((s,v)=>s+(parseFloat(v)||0),0))}</span>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button onClick={()=>{setExpVals({...expDraft});setEditExp(false);}} style={{flex:1,padding:'13px',background:'#1d4ed8',border:'none',borderRadius:'12px',color:'white',fontSize:'15px',fontWeight:'800',cursor:'pointer',fontFamily:'inherit'}}>Guardar</button>
              <button onClick={()=>setEditExp(false)} style={{padding:'13px 18px',background:'#f1f5f9',border:'none',borderRadius:'12px',color:'#64748b',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Add Asset Modal */}
      {showAddAsset && (
        <div style={overlayS} onClick={e=>{if(e.target===e.currentTarget)setShowAddAsset(false);}}>
          <div style={modalS}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
              <div style={{fontWeight:'900',fontSize:'1.2rem'}}>Agregar Activo</div>
              <button onClick={()=>setShowAddAsset(false)} style={{background:'#f1f5f9',border:'none',borderRadius:'8px',width:'32px',height:'32px',cursor:'pointer',fontSize:'16px',color:'#64748b'}}>✕</button>
            </div>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'8px'}}>CATEGORÍA</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'16px'}}>
              {ASSET_CATS.map(cat=>{
                const sel=assetDraft.categoryId===cat.id;
                return <button key={cat.id} onClick={()=>setADraft(d=>({...d,categoryId:cat.id}))}
                  style={{background:sel?cat.bg:'#f8fafc',border:`2px solid ${sel?cat.color:'#e2e8f0'}`,borderRadius:'12px',padding:'10px 12px',textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
                  <div style={{fontSize:'18px',marginBottom:'3px'}}>{cat.icon}</div>
                  <div style={{fontSize:'12px',fontWeight:'800',color:sel?cat.color:'#334155'}}>{cat.label}</div>
                  <div style={{fontSize:'10px',color:'#94a3b8',marginTop:'2px'}}>{cat.liqLabel}</div>
                </button>;
              })}
            </div>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'6px'}}>NOMBRE</div>
            <input value={assetDraft.label} onChange={e=>setADraft(d=>({...d,label:e.target.value}))}
              placeholder="Ej: Checking BofA" style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',padding:'10px 14px',fontSize:'14px',fontWeight:'700',fontFamily:'inherit',marginBottom:'14px'}}/>
            <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'#94a3b8',marginBottom:'6px'}}>VALOR</div>
            <div style={{display:'flex',alignItems:'center',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',overflow:'hidden',marginBottom:'20px'}}>
              <span style={{padding:'0 12px',color:'#94a3b8',fontSize:'18px',fontWeight:'700'}}>$</span>
              <input type="number" value={assetDraft.amount} onChange={e=>setADraft(d=>({...d,amount:e.target.value}))}
                placeholder="0" style={{flex:'1',background:'transparent',border:'none',padding:'12px 4px',fontSize:'22px',fontWeight:'900',fontFamily:'inherit',color:'#0f172a'}}
                onKeyDown={e=>{if(e.key==='Enter'){const amt=parseFloat(assetDraft.amount);if(!amt||amt<=0)return;const cat=ASSET_CATS.find(c=>c.id===assetDraft.categoryId);setAssets(p=>[...p,{id:Date.now(),categoryId:assetDraft.categoryId,label:assetDraft.label||cat.label,amount:amt}]);setADraft({categoryId:'cash',label:'',amount:''});setShowAddAsset(false);}}}/>
            </div>
            <div style={{display:'flex',gap:'10px'}}>
              <button onClick={()=>{const amt=parseFloat(assetDraft.amount);if(!amt||amt<=0)return;const cat=ASSET_CATS.find(c=>c.id===assetDraft.categoryId);setAssets(p=>[...p,{id:Date.now(),categoryId:assetDraft.categoryId,label:assetDraft.label||cat.label,amount:amt}]);setADraft({categoryId:'cash',label:'',amount:''});setShowAddAsset(false);}}
                style={{flex:1,padding:'13px',background:'#1d4ed8',border:'none',borderRadius:'12px',color:'white',fontSize:'15px',fontWeight:'800',cursor:'pointer',fontFamily:'inherit'}}>Agregar</button>
              <button onClick={()=>setShowAddAsset(false)} style={{padding:'13px 18px',background:'#f1f5f9',border:'none',borderRadius:'12px',color:'#64748b',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============= RATIOS FINANCIEROS =============
function RatiosFinancieros({ ratiosData, setRatiosData, totales, currency, ingresos, gastos, setActiveTab }) {
  const [showBenchmarkModal, setShowBenchmarkModal] = useState(false);
  const [showReservaModal, setShowReservaModal] = useState(false);
  const updateField = (field, val) => setRatiosData(prev => ({ ...prev, [field]: val }));

  // ratiosData is kept in sync by App-level useEffect

  const calcRatios = () => {
    const e=parseNumber(ratiosData.edad), ib=parseNumber(ratiosData.ingresoBruto), ineto=parseNumber(ratiosData.ingresoNeto);
    const ah=parseNumber(ratiosData.ahorroAnual), imp=parseNumber(ratiosData.impuestosAnual), seg=parseNumber(ratiosData.segurosAnual);
    const gd=parseNumber(ratiosData.gastosAnual), da=parseNumber(ratiosData.deudaAnual);
    const ge=parseNumber(ratiosData.gastosEsencialesMensuales), res=parseNumber(ratiosData.reserva);
    const pd=parseNumber(ratiosData.pagoDeudaMensual), pc=parseNumber(ratiosData.pasivosCorrientes);
    const sup = ineto-(imp+seg+gd+da+ah);
    const gastosT = imp+seg+gd+da;
    return {
      edad:e, ingresoBruto:ib, ingresoNeto:ineto, superavitAnual:sup, ahorroAnual:ah, gastosAnualesTotales:gastosT,
      activosTotales:totales.activosTotales, pasivosTotales:totales.pasivosTotales, patrimonioNeto:totales.patrimonioNeto,
      mesesReserva:     ge>0?res/ge:NaN,
      razonCorriente:   pc>0?totales.activosLiquidos/pc:NaN,
      tasaAhorro:       ib>0?ah/ib:NaN,
      capAcum:          ineto>0?(ah+sup)/ineto:NaN,
      dtiNeto:          (ineto/12)>0?pd/(ineto/12):NaN,
      deudaActivos:     totales.activosTotales>0?totales.pasivosTotales/totales.activosTotales:NaN,
      patrimonioActivos:totales.activosTotales>0?totales.patrimonioNeto/totales.activosTotales:NaN,
      inversionRatio:   ib>0?totales.inversiones/ib:NaN,
      riquezaNeta:      ib>0?totales.patrimonioNeto/ib:NaN,
      ahorroRetiro:     ib>0?totales.totalRetiro/ib:NaN,
    };
  };
  const ratios = calcRatios();

  const Tip = ({text,children}) => {
    const [show,setShow]=React.useState(false);
    return <span style={{position:'relative',display:'inline-flex',alignItems:'center'}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      {children}
      {show&&<span style={{position:'absolute',bottom:'100%',left:'50%',transform:'translateX(-50%)',marginBottom:'8px',padding:'8px 12px',background:'#1f2937',color:'white',borderRadius:'8px',fontSize:'13px',lineHeight:'1.4',width:'250px',zIndex:1000,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',pointerEvents:'none'}}>{text}</span>}
    </span>;
  };

  const getInvBm  = age => { if(age<25)return 0.2; if(age<=30)return 0.2+(age-25)*(0.6-0.2)/10; if(age<=40)return 0.6+(age-30)*(3-0.6)/10; if(age<=50)return 3+(age-40)*(8-3)/10; if(age<=60)return 8+(age-50)*(16-8)/10; return 16; };
  const getRiqBm  = age => { const bms=[{age:25,good:2.5,great:5},{age:30,good:3,great:6},{age:35,good:3.5,great:7},{age:40,good:4,great:8},{age:45,good:4.5,great:9},{age:50,good:5,great:10},{age:55,good:5.5,great:11},{age:60,good:6,great:12},{age:65,good:6.5,great:13},{age:70,good:7,great:14}]; if(age<25)return bms[0]; if(age>=70)return bms[bms.length-1]; for(let i=0;i<bms.length-1;i++){if(age>=bms[i].age&&age<bms[i+1].age){const t=(age-bms[i].age)/(bms[i+1].age-bms[i].age);return{good:bms[i].good+t*(bms[i+1].good-bms[i].good),great:bms[i].great+t*(bms[i+1].great-bms[i].great)};}} return bms[bms.length-1]; };
  const getRetBm  = age => { const bms=[{age:25,f:0.35},{age:30,f:0.85},{age:35,f:1.5},{age:40,f:2.58},{age:45,f:3.14},{age:50,f:4.92},{age:55,f:6.35},{age:60,f:7.23},{age:65,f:10.84},{age:70,f:11}]; if(age<25)return bms[0].f; if(age>=70)return bms[bms.length-1].f; for(let i=0;i<bms.length-1;i++){if(age>=bms[i].age&&age<bms[i+1].age){const t=(age-bms[i].age)/(bms[i+1].age-bms[i].age);return bms[i].f+t*(bms[i+1].f-bms[i].f);}} return bms[bms.length-1].f; };

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Activos Totales</div><div className="stat-value">{formatCurrency(totales.activosTotales,currency)}</div></div>
        <div className="stat-card" style={{background:'linear-gradient(135deg,var(--danger) 0%,#dc2626 100%)'}}><div className="stat-label">Pasivos Totales</div><div className="stat-value">{formatCurrency(totales.pasivosTotales,currency)}</div></div>
        <div className="stat-card" style={{background:totales.patrimonioNeto>=0?'linear-gradient(135deg,var(--emerald) 0%,var(--emerald-dark) 100%)':'linear-gradient(135deg,var(--danger) 0%,#dc2626 100%)'}}><div className="stat-label">Patrimonio Neto</div><div className="stat-value">{formatCurrency(totales.patrimonioNeto,currency)}</div></div>
      </div>

      

            <div>

              {/* Summary */}
              <div style={{background:'white',margin:'12px 0',borderRadius:'16px',boxShadow:'0 2px 8px rgba(0,0,0,.08)',padding:'16px'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
                  {[['Ingreso',ratios.ingresoBruto,'var(--success)'],['Gastos',ratios.gastosAnualesTotales,'var(--danger)'],['Ahorro*',ratios.ahorroAnual,'var(--success)'],['Activos',ratios.activosTotales,null],['Pasivos',ratios.pasivosTotales,null],['Patrimonio',ratios.patrimonioNeto,ratios.patrimonioNeto>=0?'var(--success)':'var(--danger)']].map(([label,val,col])=>(
                    <div key={label} style={{background:'#fafafa',borderRadius:'12px',padding:'14px',textAlign:'center'}}>
                      <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'6px',fontWeight:'600'}}>{label}</div>
                      <div style={{fontSize:'22px',fontWeight:'800',color:col||'#333'}}>{formatCurrency(val,currency)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* KPI sections */}
              {[
                {title:'💧 LIQUIDEZ', cards:[
                  {label:'Meses de reserva',val:isFinite(ratios.mesesReserva)?ratios.mesesReserva.toFixed(1)+' m':'—',ok:ratios.mesesReserva>=6?'✅':ratios.mesesReserva>=3?'⚠️':'🚨',meta:'>6 meses ✅',btn:{label:'💡 Ver recomendaciones',action:()=>setShowReservaModal(true)}},
                  {label:'Razón corriente',val:isFinite(ratios.razonCorriente)?ratios.razonCorriente.toFixed(2):'—',ok:ratios.razonCorriente>=1?'✅':'🚨',meta:'≥1.0 ✅'},
                ]},
                {title:'🐷 AHORRO', cards:[
                  {label:'Tasa de ahorro',val:isFinite(ratios.tasaAhorro)?(ratios.tasaAhorro*100).toFixed(1)+'%':'—',ok:ratios.tasaAhorro>=0.30?'✅':ratios.tasaAhorro>=0.15?'⚠️':'🚨',meta:'≥30% ✅ · 15-29% ⚠️ · <15% 🚨'},
                  {label:'Cap. acumulación',val:isFinite(ratios.capAcum)?(ratios.capAcum*100).toFixed(1)+'%':'—',ok:ratios.capAcum>=0.30?'✅':ratios.capAcum>=0.10?'⚠️':'🚨',meta:'≥30% ✅ · 10-29% ⚠️ · <10% 🚨'},
                ]},
                {title:'🏦 DEUDA', cards:[
                  {label:'DTI neto',val:isFinite(ratios.dtiNeto)?(ratios.dtiNeto*100).toFixed(1)+'%':'—',ok:ratios.dtiNeto<=0.36?'✅':'🚨',meta:'≤36% ✅ · >36% 🚨'},
                  {label:'Pasivos / Activos',val:isFinite(ratios.deudaActivos)?(ratios.deudaActivos*100).toFixed(1)+'%':'—',ok:ratios.deudaActivos<=0.30?'✅':ratios.deudaActivos<=0.50?'⚠️':'🚨',meta:'≤30% ✅ · 30-50% ⚠️ · >50% 🚨'},
                ]},
                {title:'💎 PATRIMONIO', cards:[
                  {label:'Patrimonio / Activos',val:isFinite(ratios.patrimonioActivos)?(ratios.patrimonioActivos*100).toFixed(1)+'%':'—',ok:ratios.patrimonioActivos>=0.70?'✅':ratios.patrimonioActivos>=0.50?'⚠️':'🚨',meta:'≥70% ✅ · 50-69% ⚠️ · <50% 🚨'},
                  {label:'Inversión / Ingreso',val:isFinite(ratios.inversionRatio)?ratios.inversionRatio.toFixed(2)+'x':'—',ok:ratios.edad>=18&&ratios.inversionRatio>=getInvBm(ratios.edad)?'✅':'🚨',meta:'Ver benchmark por edad',btn:{label:'📊 Benchmark',action:()=>setShowBenchmarkModal(true)}},
                  {label:'Nivel riqueza neta',val:isFinite(ratios.riquezaNeta)?ratios.riquezaNeta.toFixed(2)+'x':'—',ok:ratios.edad>=18&&ratios.riquezaNeta>=getRiqBm(ratios.edad).great?'✅':ratios.edad>=18&&ratios.riquezaNeta>=getRiqBm(ratios.edad).good?'⚠️':'🚨',meta:'Ver benchmark por edad',btn:{label:'📊 Benchmark',action:()=>setShowBenchmarkModal(true)}},
                  {label:'Ahorro para retiro',val:isFinite(ratios.ahorroRetiro)?ratios.ahorroRetiro.toFixed(2)+'x':'—',ok:ratios.edad>=18&&ratios.ahorroRetiro>=getRetBm(ratios.edad)?'✅':'🚨',meta:'Ver benchmark por edad',btn:{label:'📊 Benchmark',action:()=>setShowBenchmarkModal(true)}},
                ]},
              ].map(section => (
                <div key={section.title} style={{padding:'0 16px'}}>
                  <div style={{margin:'24px 0 12px',padding:'8px 12px',background:'var(--primary)',borderRadius:'10px',color:'#fff',fontSize:'14px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.5px'}}>{section.title}</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'16px'}}>
                    {section.cards.map(card => {
                      const isGreen  = card.ok === '✅';
                      const isYellow = card.ok === '⚠️';
                      const isRed    = card.ok === '🚨';
                      const bg       = isGreen ? '#f0fdf4' : isYellow ? '#fffbeb' : isRed ? '#fef2f2' : 'white';
                      const border   = isGreen ? '2px solid #10b981' : isYellow ? '2px solid #f59e0b' : isRed ? '2px solid #ef4444' : '2px solid var(--border)';
                      const valColor = isGreen ? '#059669' : isYellow ? '#d97706' : isRed ? '#dc2626' : '#0f172a';
                      return (
                        <div key={card.label} style={{background:bg,border,borderRadius:'14px',padding:'16px'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                            <div style={{fontSize:'15px',fontWeight:'600',color:'#0f172a'}}>{card.label}</div>
                            {card.btn && <button onClick={card.btn.action} style={{background:'var(--primary)',color:'white',padding:'4px 10px',borderRadius:'6px',fontSize:'12px',fontWeight:'700',cursor:'pointer',border:'none'}}>{card.btn.label}</button>}
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'8px'}}>
                            <span style={{fontSize:'28px',fontWeight:'800',color:valColor}}>{card.val}</span>
                            {(isGreen||isYellow||isRed) && <span style={{fontSize:'22px'}}>{card.ok}</span>}
                          </div>
                          <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:'1.4'}}>Meta: {card.meta}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

      {/* Benchmark Modal */}
      {showBenchmarkModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1001,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',backdropFilter:'blur(8px)'}} onClick={()=>setShowBenchmarkModal(false)}>
          <div style={{background:'#fff',borderRadius:'20px',maxWidth:'1100px',width:'100%',maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 24px',background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontSize:'22px',fontWeight:'800',color:'white'}}>📊 Benchmarks por Edad</div>
              <button onClick={()=>setShowBenchmarkModal(false)} style={{background:'rgba(255,255,255,0.2)',border:'none',width:'32px',height:'32px',borderRadius:'50%',fontSize:'20px',cursor:'pointer',color:'white'}}>×</button>
            </div>
            <div style={{padding:'32px',overflowY:'auto'}}>
              <BenchmarkTables ingresoBruto={ratios.ingresoBruto} />
            </div>
          </div>
        </div>
      )}

      {/* Reserva Modal */}
      {showReservaModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1001,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',backdropFilter:'blur(8px)'}} onClick={()=>setShowReservaModal(false)}>
          <div style={{background:'#fff',borderRadius:'20px',maxWidth:'900px',width:'100%',maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 24px',background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontSize:'22px',fontWeight:'800',color:'white'}}>💡 Recomendaciones de Reserva</div>
              <button onClick={()=>setShowReservaModal(false)} style={{background:'rgba(255,255,255,0.2)',border:'none',width:'32px',height:'32px',borderRadius:'50%',fontSize:'20px',cursor:'pointer',color:'white'}}>×</button>
            </div>
            <div style={{padding:'32px',overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',background:'#fff',borderRadius:'12px',overflow:'hidden'}}>
                <thead style={{background:'var(--primary)',color:'#fff'}}><tr><th style={{padding:'14px 16px',textAlign:'left',color:'white'}}>Meses</th><th style={{padding:'14px 16px',textAlign:'left',color:'white'}}>Situación</th></tr></thead>
                <tbody>
                  {[['6 meses','Empleo estable + buena liquidez'],['9 meses','Empleo estable + dependientes'],['12 meses','Empleo inestable + dependientes'],['18 meses','Ingresos variables (freelance)'],['24 meses','Negocio propio / alta volatilidad'],['36 meses','Ingresos irregulares / pre-retiro']].map(([m,s])=>(
                    <tr key={m} style={{borderBottom:'1px solid var(--border)'}}><td style={{padding:'16px',fontSize:'20px',fontWeight:'700',color:'var(--success)'}}>{m}</td><td style={{padding:'16px',fontSize:'15px'}}>{s}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════════════
//  MetasPlan — Goals tracking and quantification
// ════════════════════════════════════════════════════════════════════════════
function MetasPlan({ goals, setGoals, ingresos, totales, currency, userProfile }) {
  const [editingIdx, setEditingIdx] = React.useState(null);
  const [showAddModal, setShowAddModal] = React.useState(false);

  const fmtC = (v) => formatCurrency(v, currency);
  const ingresoBruto = ingresos.reduce((s,i)=>s+parseFloat(i.monto||0),0)*12;
  const ingresoBrutoMensual = ingresoBruto / 12;

  const GOAL_META = {
    casa:          { icon:'🏠', label:'Comprar Casa',               color:'#3b82f6', bg:'#eff6ff' },
    retiro:        { icon:'🏖️', label:'Retiro Cómodo',              color:'#f59e0b', bg:'#fffbeb' },
    emergencia:    { icon:'🛡️', label:'Fondo de Emergencia',        color:'#10b981', bg:'#f0fdf4' },
    educacion:     { icon:'🎓', label:'Educación de Hijos',         color:'#8b5cf6', bg:'#f5f3ff' },
    viaje:         { icon:'✈️', label:'Viaje / Vacaciones',         color:'#06b6d4', bg:'#ecfeff' },
    deudas:        { icon:'💳', label:'Pagar Deudas',               color:'#ef4444', bg:'#fef2f2' },
    negocio:       { icon:'💼', label:'Iniciar Negocio',            color:'#6366f1', bg:'#eef2ff' },
    auto:          { icon:'🚗', label:'Comprar Auto',               color:'#64748b', bg:'#f8fafc' },
    inversiones:   { icon:'📈', label:'Hacer Crecer Dinero',        color:'#059669', bg:'#ecfdf5' },
    independencia: { icon:'🦅', label:'Independencia Financiera',   color:'#dc2626', bg:'#fef2f2' },
    herencia:      { icon:'🎁', label:'Dejar Herencia',             color:'#d97706', bg:'#fffbeb' },
    otro:          { icon:'🎯', label:'Otra Meta',                  color:'#7c3aed', bg:'#f5f3ff' },
  };

  const ALL_GOAL_KEYS = Object.keys(GOAL_META);

  // Computed fields per goal
  function computeGoal(g) {
    const d = g.details || {};
    const computed = {};

    if (g.key === 'retiro') {
      const edadActual = parseInt(userProfile?.edad) || 40;
      const edadRetiro = parseInt(d.edadRetiro) || 65;
      const ingresoMensual = parseFloat(d.ingresoMensual) || 0;
      const anosParaRetiro = Math.max(0, edadRetiro - edadActual);
      const neededNest = ingresoMensual * 12 * 25; // 4% rule
      const tasaReemplazo = ingresoBrutoMensual > 0 ? ((ingresoMensual / ingresoBrutoMensual) * 100).toFixed(0) : 0;
      computed.label1 = `Edad objetivo: ${edadRetiro} años`;
      computed.label2 = `${anosParaRetiro} años para lograrlo`;
      computed.label3 = `Tasa de reemplazo: ${tasaReemplazo}%`;
      computed.neededNest = neededNest;
      computed.neededLabel = `Nido estimado (regla 4%): ${formatCurrency(neededNest, currency)}`;
      computed.monthlyNeeded = anosParaRetiro > 0
        ? Math.round(neededNest / (anosParaRetiro * 12))
        : 0;
    }

    if (g.key === 'independencia') {
      const edadObj = parseInt(d.edadObjetivo) || 50;
      const edadActual = parseInt(userProfile?.edad) || 40;
      const ingresoMensual = parseFloat(d.ingresoMensual) || 0;
      const ingresoPasivo = parseFloat(d.ingresoPasivo) || 0;
      const neededNest = ingresoMensual * 12 * 25;
      const gap = Math.max(0, ingresoMensual - ingresoPasivo);
      const anosRestantes = Math.max(0, edadObj - edadActual);
      computed.label1 = `Edad objetivo: ${edadObj} años (${anosRestantes} años)`;
      computed.label2 = `Ingreso pasivo deseado: ${formatCurrency(ingresoMensual, currency)}/mes`;
      computed.label3 = `Ingresos pasivos actuales: ${formatCurrency(ingresoPasivo, currency)}/mes`;
      computed.neededNest = neededNest;
      computed.neededLabel = `Número mágico (regla 4%): ${formatCurrency(neededNest, currency)}`;
      computed.monthlyNeeded = anosRestantes > 0
        ? Math.round(Math.max(0, neededNest - totales.inversiones) / (anosRestantes * 12))
        : 0;
    }

    if (g.key === 'casa') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      const faltante = Math.max(0, precio * 0.2 - enganche);
      computed.label1 = d.tipo || '';
      computed.label2 = d.cuando ? `Plazo: ${d.cuando}` : '';
      computed.label3 = precio > 0 ? `Precio estimado: ${formatCurrency(precio, currency)}` : '';
      if (precio > 0) {
        computed.neededLabel = `Enganche 20%: ${formatCurrency(precio*0.2, currency)} · Tienes: ${formatCurrency(enganche, currency)} · Falta: ${formatCurrency(faltante, currency)}`;
      }
    }

    if (g.key === 'educacion') {
      const pph = parseFloat(d.presupuesto) || 0;
      const nhijos = parseInt(d.numHijos) || 1;
      const total = pph * nhijos;
      computed.label1 = d.numHijos ? `${d.numHijos} hijo(s)` : '';
      computed.label2 = d.anosInicio ? `Inicia en: ${d.anosInicio}` : '';
      computed.label3 = d.tipo || '';
      if (total > 0) computed.neededLabel = `Total estimado: ${formatCurrency(total, currency)} (${formatCurrency(pph, currency)} × ${nhijos})`;
    }

    if (g.key === 'viaje') {
      computed.label1 = d.destino ? `Destino: ${d.destino}` : '';
      computed.label2 = d.cuando ? `Cuándo: ${d.cuando}` : '';
      if (d.presupuesto) computed.neededLabel = `Presupuesto: ${formatCurrency(parseFloat(d.presupuesto)||0, currency)}`;
    }

    if (g.key === 'auto') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      computed.label1 = d.tipo || '';
      computed.label2 = d.cuando ? `Cuándo: ${d.cuando}` : '';
      if (precio > 0) computed.neededLabel = `Precio: ${formatCurrency(precio, currency)} · Enganche disp.: ${formatCurrency(enganche, currency)}`;
    }

    if (g.key === 'herencia') {
      computed.label1 = d.beneficiarios ? `Para: ${d.beneficiarios}` : '';
      computed.label2 = d.plazo ? `Plazo: ${d.plazo}` : '';
      if (d.monto) computed.neededLabel = `Objetivo: ${formatCurrency(parseFloat(d.monto)||0, currency)}`;
    }

    if (g.key === 'deudas') {
      const totalDeuda = Object.values(totales._deudas || {}).flat ? 0 : 0;
      computed.label1 = 'Eliminar todas las deudas';
      computed.label2 = `Deuda actual: ${formatCurrency(totales.pasivosTotales || 0, currency)}`;
      computed.neededLabel = `Ver calculadora "Salir de Deuda" para el plan detallado`;
    }

    if (g.key === 'emergencia') {
      const gastosMes = ingresoBrutoMensual * 0.6;
      const metaSeis  = gastosMes * 6;
      const disponible = totales.totalEfectivo || 0;
      computed.label1 = 'Reserva de 6+ meses de gastos';
      computed.label2 = `Liquidez actual: ${formatCurrency(disponible, currency)}`;
      computed.neededLabel = `Meta estimada (6 meses): ${formatCurrency(metaSeis, currency)}`;
    }

    if (g.key === 'inversiones' || g.key === 'negocio') {
      computed.label1 = g.key === 'inversiones' ? 'Incrementar inversiones activamente' : 'Iniciar o expandir negocio';
      computed.label2 = `Inversiones actuales: ${formatCurrency(totales.inversiones || 0, currency)}`;
    }

    if (g.key === 'otro') {
      computed.label1 = d.descripcion || '';
      computed.label2 = d.plazo ? `Plazo: ${d.plazo}` : '';
      if (d.monto) computed.neededLabel = `Objetivo: ${formatCurrency(parseFloat(d.monto)||0, currency)}`;
    }

    return computed;
  }

  // Progress bar width
  function getProgress(g) {
    const d = g.details || {};
    if (g.key === 'retiro' || g.key === 'independencia') {
      const needed = g.key === 'retiro'
        ? (parseFloat(d.ingresoMensual)||0)*12*25
        : (parseFloat(d.ingresoMensual)||0)*12*25;
      return needed > 0 ? Math.min(100, Math.round((totales.inversiones/needed)*100)) : 0;
    }
    if (g.key === 'emergencia') {
      const gastosMes = ingresoBrutoMensual * 0.6;
      const meta = gastosMes * 6;
      return meta > 0 ? Math.min(100, Math.round((totales.totalEfectivo/meta)*100)) : 0;
    }
    if (g.key === 'casa' || g.key === 'auto') {
      const precio = parseFloat(d.precio) || 0;
      const enganche = parseFloat(d.enganche) || 0;
      const meta = precio * (g.key === 'casa' ? 0.2 : 0.15);
      return meta > 0 ? Math.min(100, Math.round((enganche/meta)*100)) : 0;
    }
    if (g.key === 'deudas') {
      return 0; // no simple progress — link to calc
    }
    return null; // no progress bar
  }

  function GoalCard({ g, idx }) {
    const meta = GOAL_META[g.key] || GOAL_META.otro;
    const computed = computeGoal(g);
    const progress = getProgress(g);
    const hasDetails = g.details && Object.keys(g.details).filter(k=>!k.startsWith('_')).length > 0;

    return (
      <div style={{background:'#fff', border:`2px solid ${meta.color}22`, borderRadius:'16px', padding:'20px', position:'relative', boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        {/* Header */}
        <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'12px'}}>
          <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
            <div style={{fontSize:'32px', lineHeight:'1'}}>{meta.icon}</div>
            <div>
              <div style={{fontWeight:'800', fontSize:'15px', color:meta.color}}>{meta.label}</div>
              {g.status && <div style={{fontSize:'11px', fontWeight:'700', color: g.status==='completada'?'#10b981':g.status==='en_progreso'?'#f59e0b':'#94a3b8', textTransform:'uppercase', letterSpacing:'0.05em', marginTop:'2px'}}>{g.status==='completada'?'✅ Completada':g.status==='en_progreso'?'⏳ En Progreso':'⬜ Pendiente'}</div>}
            </div>
          </div>
          <div style={{display:'flex', gap:'6px'}}>
            <button onClick={()=>setEditingIdx(idx)} style={{background:meta.bg, border:`1px solid ${meta.color}44`, borderRadius:'8px', padding:'4px 10px', fontSize:'12px', fontWeight:'700', color:meta.color, cursor:'pointer'}}>✏️ Editar</button>
            <button onClick={()=>{ if(confirm('¿Eliminar esta meta?')) setGoals(prev=>prev.filter((_,i)=>i!==idx)); }} style={{background:'#fef2f2', border:'1px solid #fca5a5', borderRadius:'8px', padding:'4px 8px', fontSize:'12px', color:'#dc2626', cursor:'pointer'}}>×</button>
          </div>
        </div>

        {/* Details */}
        {hasDetails && (
          <div style={{background:meta.bg, borderRadius:'10px', padding:'12px', marginBottom:'12px'}}>
            {[computed.label1, computed.label2, computed.label3].filter(Boolean).map((l,i)=>(
              <div key={i} style={{fontSize:'13px', color:'#475569', marginBottom:'3px'}}>• {l}</div>
            ))}
          </div>
        )}

        {/* Needed amount highlight */}
        {computed.neededLabel && (
          <div style={{background:`${meta.color}11`, border:`1px solid ${meta.color}33`, borderRadius:'10px', padding:'10px 12px', marginBottom:'12px', fontSize:'13px', fontWeight:'700', color:meta.color}}>
            💡 {computed.neededLabel}
          </div>
        )}

        {/* Monthly savings needed */}
        {computed.monthlyNeeded > 0 && (
          <div style={{background:'#1e293b', borderRadius:'10px', padding:'10px 12px', marginBottom:'12px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontSize:'12px', color:'#94a3b8', fontWeight:'600'}}>Ahorro mensual sugerido</span>
            <span style={{fontSize:'18px', fontWeight:'800', color:'#f59e0b'}}>{formatCurrency(computed.monthlyNeeded, currency)}/mes</span>

        {progress !== null && (
          <div>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}>
              <span style={{fontSize:'11px', color:'#94a3b8', fontWeight:'600'}}>PROGRESO ESTIMADO</span>

            </div>
            <div style={{background:'#f1f5f9', borderRadius:'999px', height:'8px', overflow:'hidden'}}>

    );
  }

  // Edit / Add modal
  function GoalEditModal({ g, onSave, onClose }) {
    const [form, setForm] = React.useState({ status: g?.status || 'pendiente', notes: g?.notes || '', ...(g?.details || {}) });
    const meta = GOAL_META[g?.key] || {};

    const STATUS_OPTS = [
      {val:'pendiente',   lbl:'⬜ Pendiente'},
      {val:'en_progreso', lbl:'⏳ En Progreso'},
      {val:'completada',  lbl:'✅ Completada'},
    ];

    const FIELDS_BY_KEY = {
      retiro:        [{id:'edadRetiro', lbl:'Edad objetivo de retiro', type:'number', ph:'62'}, {id:'ingresoMensual', lbl:'Ingreso mensual deseado ($)', type:'number', ph:'7000'}],
      independencia: [{id:'edadObjetivo', lbl:'Edad objetivo', type:'number', ph:'50'}, {id:'ingresoMensual', lbl:'Ingreso mensual pasivo deseado ($)', type:'number', ph:'7000'}, {id:'ingresoPasivo', lbl:'Ingresos pasivos actuales/mes ($)', type:'number', ph:'0'}],
      casa:          [{id:'tipo', lbl:'Tipo', type:'select', opts:['Primera vivienda','Segunda vivienda','Inversión']}, {id:'cuando', lbl:'¿Cuándo?', type:'select', opts:['1-2 años','3-5 años','5+ años']}, {id:'precio', lbl:'Precio estimado ($)', type:'number', ph:'400000'}, {id:'enganche', lbl:'Enganche disponible ($)', type:'number', ph:'60000'}],
      educacion:     [{id:'numHijos', lbl:'# hijos', type:'number', ph:'1'}, {id:'anosInicio', lbl:'Años para inicio', type:'select', opts:['< 3 años','3-5 años','6-10 años','10+ años']}, {id:'tipo', lbl:'Tipo universidad', type:'select', opts:['Pública','Privada','Ivy / Top 20']}, {id:'presupuesto', lbl:'Presupuesto por hijo ($)', type:'number', ph:'80000'}],
      viaje:         [{id:'destino', lbl:'Destino', type:'text', ph:'Ej: Europa'}, {id:'cuando', lbl:'¿Cuándo?', type:'select', opts:['Este año','1-2 años','3-5 años','Sin fecha']}, {id:'presupuesto', lbl:'Presupuesto ($)', type:'number', ph:'8000'}],
      auto:          [{id:'tipo', lbl:'¿Nuevo o usado?', type:'select', opts:['Nuevo','Usado','No sé']}, {id:'cuando', lbl:'¿Cuándo?', type:'select', opts:['< 6 meses','6-12 meses','1-2 años','Sin prisa']}, {id:'precio', lbl:'Precio estimado ($)', type:'number', ph:'35000'}, {id:'enganche', lbl:'Enganche disponible ($)', type:'number', ph:'5000'}],
      herencia:      [{id:'monto', lbl:'Monto objetivo ($)', type:'number', ph:'500000'}, {id:'beneficiarios', lbl:'¿A quiénes?', type:'select', opts:['Hijos','Cónyuge e hijos','Nietos','Organización','Combinación']}, {id:'plazo', lbl:'Plazo', type:'select', opts:['< 10 años','10-20 años','20+ años']}],
      otro:          [{id:'descripcion', lbl:'Descripción', type:'text', ph:'Describe tu meta'}, {id:'monto', lbl:'Monto estimado ($)', type:'number', ph:'50000'}, {id:'plazo', lbl:'Plazo', type:'select', opts:['< 1 año','1-3 años','3-5 años','5+ años']}],
    };

    const fields = FIELDS_BY_KEY[g?.key] || [];

    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',backdropFilter:'blur(4px)'}} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
        <div style={{background:'#fff',borderRadius:'20px',maxWidth:'460px',width:'100%',padding:'28px',boxShadow:'0 24px 64px rgba(15,23,42,0.25)',maxHeight:'90vh',overflowY:'auto'}}>
          <div style={{fontSize:'32px',marginBottom:'6px'}}>{meta.icon}</div>
          <h3 style={{margin:'0 0 4px',fontSize:'20px',fontWeight:'800'}}>{meta.label}</h3>
          <p style={{margin:'0 0 20px',color:'#64748b',fontSize:'14px'}}>Actualiza los detalles de esta meta</p>

          {/* Status */}
          <div style={{marginBottom:'16px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:'700',marginBottom:'6px'}}>Estado</label>
            <div style={{display:'flex',gap:'8px'}}>
              {STATUS_OPTS.map(s=>(
                <button key={s.val} onClick={()=>setForm(f=>({...f,status:s.val}))}
                  style={{flex:1,padding:'8px',borderRadius:'10px',border:`2px solid ${form.status===s.val?meta.color:'#e5e7eb'}`,background:form.status===s.val?`${meta.color}11`:'#fff',fontWeight:'700',fontSize:'12px',cursor:'pointer',color:form.status===s.val?meta.color:'#64748b'}}>
                  {s.lbl}
                </button>
              ))}
            </div>
          </div>

          {/* Dynamic fields */}
          {fields.map(f=>(
            <div key={f.id} style={{marginBottom:'14px'}}>
              <label style={{display:'block',fontSize:'13px',fontWeight:'700',marginBottom:'6px'}}>{f.lbl}</label>
              {f.type === 'select'
                ? <select value={form[f.id]||''} onChange={e=>setForm(v=>({...v,[f.id]:e.target.value}))} style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e5e7eb',borderRadius:'10px',fontSize:'14px',fontFamily:'inherit'}}>
                    <option value=''>Selecciona…</option>
                    {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
                  </select>
                : <input type={f.type} value={form[f.id]||''} onChange={e=>setForm(v=>({...v,[f.id]:e.target.value}))} placeholder={f.ph} style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e5e7eb',borderRadius:'10px',fontSize:'14px',fontFamily:'inherit',boxSizing:'border-box'}}/>
              }
            </div>
          ))}

          {/* Notes */}
          <div style={{marginBottom:'20px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:'700',marginBottom:'6px'}}>Notas adicionales</label>
            <textarea value={form.notes||''} onChange={e=>setForm(v=>({...v,notes:e.target.value}))} placeholder='Ej: Hablar con realtor en marzo…' style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e5e7eb',borderRadius:'10px',fontSize:'14px',fontFamily:'inherit',minHeight:'70px',resize:'vertical',boxSizing:'border-box'}}/>
          </div>

          <div style={{display:'flex',gap:'10px'}}>

            <button onClick={()=>{ const {status,notes,...details}=form; onSave({status,notes,details}); onClose(); }} style={{flex:2,padding:'11px',borderRadius:'12px',border:'none',background:`linear-gradient(90deg,${meta.color},${meta.color}cc)`,color:'#fff',fontWeight:'800',cursor:'pointer'}}>Guardar ✓</button>
          </div>
        </div>
      </div>
    );
  }

  // Add goal modal
  function AddGoalModal({ onAdd, onClose }) {
    const existing = new Set(goals.map(g=>g.key));
    const available = ALL_GOAL_KEYS.filter(k=>!existing.has(k));
    return (
      <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',backdropFilter:'blur(4px)'}} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
        <div style={{background:'#fff',borderRadius:'20px',maxWidth:'480px',width:'100%',padding:'28px',boxShadow:'0 24px 64px rgba(15,23,42,0.25)'}}>
          <h3 style={{margin:'0 0 4px',fontSize:'20px',fontWeight:'800'}}>➕ Agregar Meta</h3>
          <p style={{margin:'0 0 20px',color:'#64748b',fontSize:'14px'}}>Selecciona una meta para agregar</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            {available.map(k=>{
              const m=GOAL_META[k];
              return (
                <button key={k} onClick={()=>{ onAdd(k); onClose(); }}
                  style={{display:'flex',alignItems:'center',gap:'10px',padding:'14px',borderRadius:'12px',border:`2px solid ${m.color}33`,background:m.bg,cursor:'pointer',textAlign:'left',fontWeight:'700',fontSize:'14px',color:m.color}}>
                  <span style={{fontSize:'24px'}}>{m.icon}</span>{m.label}
                </button>
              );
            })}
          </div>
          {available.length === 0 && <p style={{textAlign:'center',color:'#64748b',padding:'20px 0'}}>Ya tienes todas las metas disponibles ✓</p>}
          <button onClick={onClose} style={{width:'100%',marginTop:'16px',padding:'11px',borderRadius:'12px',border:'1px solid #e5e7eb',background:'#f8fafc',fontWeight:'700',cursor:'pointer'}}>Cancelar</button>
        </div>
      </div>
    );
  }

  const totalGoals = goals.length;
  const completadas = goals.filter(g=>g.status==='completada').length;
  const enProgreso  = goals.filter(g=>g.status==='en_progreso').length;

  return (
    <div>
      {/* Header stats */}
      <div className="stats-grid" style={{marginBottom:'24px'}}>
        <div className="stat-card"><div className="stat-label">Metas Totales</div><div className="stat-value">{totalGoals}</div></div>
        <div className="stat-card" style={{background:'linear-gradient(135deg,#f59e0b,#d97706)'}}><div className="stat-label">En Progreso</div><div className="stat-value">{enProgreso}</div></div>
        <div className="stat-card" style={{background:'linear-gradient(135deg,var(--emerald),var(--emerald-dark))'}}><div className="stat-label">Completadas</div><div className="stat-value">{completadas}</div></div>
      </div>

      {/* Goals grid */}
      {goals.length === 0 ? (
        <div style={{textAlign:'center',padding:'60px 20px',background:'#f8fafc',borderRadius:'16px',border:'2px dashed #e2e8f0'}}>
          <div style={{fontSize:'48px',marginBottom:'12px'}}>🎯</div>
          <h3 style={{margin:'0 0 8px',color:'#475569'}}>Sin metas registradas</h3>
          <p style={{color:'#94a3b8',margin:'0 0 20px',fontSize:'14px'}}>Importa un archivo del Discovery o agrega metas manualmente</p>
          <button onClick={()=>setShowAddModal(true)} style={{padding:'12px 24px',background:'linear-gradient(90deg,var(--primary),var(--secondary))',color:'#fff',border:'none',borderRadius:'12px',fontWeight:'700',cursor:'pointer',fontSize:'15px'}}>➕ Agregar Meta</button>
        </div>
      ) : (
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:'20px',marginBottom:'24px'}}>
            {goals.map((g,idx)=>(
              <GoalCard key={g.key} g={g} idx={idx} />
            ))}
          </div>
          <button onClick={()=>setShowAddModal(true)} style={{display:'flex',alignItems:'center',gap:'8px',padding:'12px 20px',background:'linear-gradient(90deg,var(--primary),var(--secondary))',color:'#fff',border:'none',borderRadius:'12px',fontWeight:'700',cursor:'pointer',fontSize:'14px'}}>
            ➕ Agregar otra meta
          </button>
        </>
      )}

      {/* Edit Modal */}
      {editingIdx !== null && (
        <GoalEditModal
          g={goals[editingIdx]}
          onSave={({status,notes,details})=>{
            setGoals(prev=>prev.map((g,i)=>i===editingIdx?{...g,status,notes,details:{...g.details,...details}}:g));
          }}
          onClose={()=>setEditingIdx(null)}
        />
      )}

      {/* Add Modal */}
      {showAddModal && (
        <AddGoalModal
          onAdd={(key)=>setGoals(prev=>[...prev,{key,status:'pendiente',details:{},notes:''}])}
          onClose={()=>setShowAddModal(false)}
        />
      )}
    </div>
  );
}

function RetiroCalculator({ userProfile, ingresos, activos, goals = [] }) {
  const edadActual   = parseInt(userProfile?.edad) || 40;
  const ingresoAnual = Math.round(ingresos.reduce((s,i)=>s+parseFloat(i.monto||0),0)*12);
  const ahorroRetiro = Math.round((activos.retiro||[]).reduce((s,i)=>s+parseFloat(i.valor||0),0));
  const ahorroInvers = Math.round((activos.inversiones||[]).reduce((s,i)=>s+parseFloat(i.valor||0),0));
  const ahorroTotal  = ahorroRetiro + ahorroInvers;
  const retiroGoal   = goals.find(g=>g.key==='retiro');
  const edadRetiro   = parseInt(retiroGoal?.details?.edadRetiro) || 65;
  const ingresoMes   = parseFloat(retiroGoal?.details?.ingresoMensual) || 0;
  const ratioReemplazo = ingresoAnual > 0 && ingresoMes > 0
    ? Math.round((ingresoMes / (ingresoAnual/12)) * 100) : 80;

  const iframeSrc = React.useMemo(() => {
    const b64 = window._RETIRO_CALC_B64;
    if (!b64) return '';
    let html = atob(b64);
    html = html
      .replace('__EDAD_ACTUAL__',     String(edadActual))
      .replace('__EDAD_RETIRO__',     String(edadRetiro))
      .replace('__INGRESO_ANUAL__',   String(ingresoAnual > 0 ? ingresoAnual : 75000))
      .replace('__AHORRO_ACTUAL__',   String(ahorroTotal))
      .replace('__RATIO_REEMPLAZO__', String(ratioReemplazo));
    return 'data:text/html;base64,' + btoa(html);
  }, [edadActual, edadRetiro, ingresoAnual, ahorroTotal, ratioReemplazo]);

  const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

  return (
    <div style={{padding:'0'}}>
      <div style={{background:'#dbeafe',borderLeft:'4px solid #3b82f6',borderRadius:'10px',padding:'12px 16px',marginBottom:'14px',fontSize:'13px',color:'#1e40af'}}>
        <strong>Datos desde Money Map: </strong>
        Edad {edadActual} · Ingreso anual {fmt(ingresoAnual)} · Ahorros {fmt(ahorroTotal)} · Edad retiro {edadRetiro}
      </div>
      {iframeSrc
        ? <iframe
            src={iframeSrc}
            style={{width:'100%',height:'900px',border:'none',borderRadius:'10px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}
            title="Calculadora Retiro"
          />
        : <div style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'14px'}}>
            ⏳ Cargando calculadora...
          </div>
      }
    </div>
  );
}

function BenchmarkTables({ ingresoBruto }) {
  const ing = ingresoBruto || 0;
  const fmt$ = n => '$' + new Intl.NumberFormat('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
  const fmtX = n => n.toFixed(2) + 'x';
  const ingLabel = ing > 0 ? `Ejemplo (${fmt$(ing)}/año)` : 'Ejemplo (ingreso del caso)';

  // Benchmarks at 5-year intervals
  const AGES = [25,30,35,40,45,50,55,60,65,70];

  // Inversión / Ingreso Bruto (Stanley-style)
  const invBm = {25:0.2,30:0.6,35:1.2,40:2.0,45:3.5,50:5.5,55:8.5,60:12.0,65:16.0,70:18.0};

  // Nivel de Riqueza Neta — good / great multiples of gross income
  const riqBm = {
    25:{good:2.5,great:5.0},30:{good:3.0,great:6.0},35:{good:3.5,great:7.0},
    40:{good:4.0,great:8.0},45:{good:4.5,great:9.0},50:{good:5.0,great:10.0},
    55:{good:5.5,great:11.0},60:{good:6.0,great:12.0},65:{good:6.5,great:13.0},70:{good:7.0,great:14.0}
  };

  // Ahorro para Retiro (Fidelity-style multiples)
  const retBm = {25:0.35,30:1.0,35:2.0,40:3.0,45:4.0,50:6.0,55:7.0,60:8.0,65:10.0,70:11.0};

  const tableStyle = {width:'100%',borderCollapse:'collapse',background:'#fff',borderRadius:'12px',overflow:'hidden',marginBottom:'24px'};
  const thStyle    = {padding:'12px 14px',textAlign:'left',fontWeight:'700',fontSize:'13px',color:'white'};
  const tdStyle    = (highlight) => ({padding:'11px 14px',borderBottom:'1px solid var(--border)',background:highlight?'#fffbeb':'white',fontWeight:highlight?'700':'400'});

  return (
    <div>
      {ing > 0 && (
        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'10px',padding:'12px 16px',marginBottom:'24px',fontSize:'14px',color:'#1d4ed8',fontWeight:'600'}}>
          📊 Columna "Ejemplo" calculada con el ingreso bruto del caso: <b>{fmt$(ing)}/año</b>
        </div>
      )}

      {/* Inversión / Ingreso */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>💰 Inversión / Ingreso Bruto</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Benchmark</th>
            {ing>0 && <th style={thStyle}>{ingLabel}</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(invBm[age])}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*invBm[age])}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Nivel de Riqueza Neta */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>💎 Nivel de Riqueza Neta</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Good ⚠️</th>
            {ing>0 && <th style={thStyle}>Ejemplo Good</th>}
            <th style={thStyle}>Great ✅</th>
            {ing>0 && <th style={thStyle}>Ejemplo Great</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(riqBm[age].good)}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*riqBm[age].good)}</td>}
                <td style={tdStyle(false)}>{fmtX(riqBm[age].great)}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*riqBm[age].great)}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Ahorro para Retiro */}
      <div style={{marginBottom:'32px'}}>
        <h3 style={{margin:'0 0 14px',padding:'12px 16px',fontSize:'17px',fontWeight:'700',color:'white',background:'var(--primary)',borderRadius:'10px'}}>🏖️ Ahorro para Retiro</h3>
        <table style={tableStyle}>
          <thead style={{background:'var(--primary)'}}><tr>
            <th style={thStyle}>Edad</th>
            <th style={thStyle}>Benchmark</th>
            {ing>0 && <th style={thStyle}>{ingLabel}</th>}
          </tr></thead>
          <tbody>
            {AGES.map(age=>(
              <tr key={age}>
                <td style={tdStyle(false)}><b>{age}</b></td>
                <td style={tdStyle(false)}>{fmtX(retBm[age])}</td>
                {ing>0 && <td style={tdStyle(true)}>{fmt$(ing*retBm[age])}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
